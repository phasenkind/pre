<style>
  body {
    background: black;
    color: #cccccc;

    padding: 20px;
  }

  .itemFields label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
  }

  .itemFields select,
  .itemFields input[type="checkbox"],
  .itemFields button {
    background: black;
    color: #cccccc;
    border: 1px solid #cccccc;
    padding: 6px;
    display: block;
    margin-top: 4px;
    margin-bottom: 16px;
  }

  .compact select,
  .compact input[type="checkbox"] {
    margin-bottom: 12px;
  }

  .header-red {
  color: #8a090c; 
  }

  .hidden { display: none; }

  h3 { 
    margin-top: 24px;
  }
</style>

<h2 class="header-red">Pre-Searing Item Checker</h2>

<select id="itemType" onchange="showFields()">
  <option value="">-- Select --</option>
  <option value="staff">Staff</option>
  <option value="axe">Axe</option>
  <option value="sword">Sword</option>
  <option value="hammer">Hammer</option>
  <option value="bow">Bow</option>
</select>

    <label>HSR %:</label>
    <select id="staff_hsr"><option value="">-- Select --</option></select>

    <label>Energy:</label>
    <select id="staff_energy"><option value="">-- Select --</option></select>

    <label>Inherent Modifier:</label>
    <select id="staff_inherent" onchange="inherentChanged()">
      <option value="">-- Select --</option>
      <option value="none">None</option>
      <option value="reduces_duration">Reduces condition duration</option>
      <option value="hct">HCT</option>
    </select>

    <div id="hctAttributeDiv" class="hidden compact">

        <option value="divine">Divine Favor</option>

        <option value="illu">Illusion</option>

    </div>

    <div id="hctPercentDiv" class="hidden compact">
      <label>HCT %:</label>
      <select id="staff_hct_percent" class="compact">
        <option value="">-- Select --</option>
      </select>
    </div>

  </div>

function resetAllFields() {
  document.querySelectorAll(".itemFields select").forEach(select => {
    document.getElementById("no_req").checked = false;
    document.getElementById("result").innerText = "";
  });

  document.querySelectorAll('.itemFields input[type="checkbox"]').forEach(checkbox => {
  checkbox.checked = false;
  });

  const hctAttributeDiv = document.getElementById("hctAttributeDiv");
  const hctPercentDiv = document.getElementById("hctPercentDiv");

  if (hctAttributeDiv) hctAttributeDiv.classList.add("hidden");
  if (hctPercentDiv) hctPercentDiv.classList.add("hidden");

  document.querySelectorAll(".weaponDamagePercentDiv").forEach(div => {
    div.classList.add("hidden");
  });

  document.querySelectorAll(".weapon_damage_percent").forEach(select => {
    select.innerHTML = '<option value="">-- Select --</option>';
  });

  document.getElementById("result").innerText = "";
}

  document.querySelectorAll(".itemFields").forEach(div => {
    const types = div.dataset.type.split(",");
    div.classList.toggle("hidden", !types.includes(type));
  });

  checkButton.classList.toggle("hidden", type === "");

  if (type === "staff") {
    populateHSR();
    populateEnergy();
  }
}

  function populateHSR() {
    const hsrSelect = document.getElementById("staff_hsr");
    hsrSelect.innerHTML = '<option value="">-- Select --</option>';
    [11,12,13,14,15,16].forEach(v => hsrSelect.add(new Option(v, v)));
  }

  function populateEnergy() {
    const energySelect = document.getElementById("staff_energy");
    energySelect.innerHTML = '<option value="">-- Select --</option>';
    [5,6,7,8].forEach(v => energySelect.add(new Option(v, v)));
  }

  function inherentChanged() {
    const inherent = document.getElementById("staff_inherent").value;
    const hctDiv = document.getElementById("hctAttributeDiv");
    if (inherent === "hct") hctDiv.classList.remove("hidden");
    else {
      hctDiv.classList.add("hidden");
      document.getElementById("staff_attr").value = "";
      document.getElementById("hctPercentDiv").classList.add("hidden");
    }
  }
 
  function hctAttributeChanged() {
    const attr = document.getElementById("staff_attr").value;
    const percentDiv = document.getElementById("hctPercentDiv");
    const percentSelect = document.getElementById("staff_hct_percent");
    percentSelect.innerHTML = '<option value="">-- Select --</option>';
    if (attr) {
      percentDiv.classList.remove("hidden");
      const values = attr === "generic" ? [8,9] : [15,16,17,18];
      values.forEach(v => percentSelect.add(new Option(v, v)));
    } else percentDiv.classList.add("hidden");
  }

  function calculateTier() {
    const hsr = document.getElementById("staff_hsr").value;
    const energy = document.getElementById("staff_energy").value;
    const noReq = document.getElementById("no_req").checked ? "yes" : "no";
    const inherent = document.getElementById("staff_inherent").value;
    const attr = document.getElementById("staff_attr").value;
    const hctPercent = document.getElementById("staff_hct_percent").value;

    for (let mapping of staffTierMappings) {
      if ((mapping.noReq === "" || mapping.noReq === noReq) &&
          (mapping.hsr === "" || mapping.hsr === hsr) &&
          (mapping.energy === "" || mapping.energy === energy) &&
          (mapping.inherent === "" || mapping.inherent === inherent) &&
          (mapping.attr === "" || mapping.attr === attr) &&
          (mapping.hctPercent === "" || mapping.hctPercent === hctPercent)) {
        return mapping.tier;
      }
    }
    return "Junk";
  }
  
function weaponInherentChanged(selectElem) {
  const inherent = selectElem.value;
  const container = selectElem.closest(".itemFields");
  const percentDiv = container.querySelector(".weaponDamagePercentDiv");
  const percentSelect = container.querySelector(".weapon_damage_percent");

  percentSelect.innerHTML = '<option value="">-- Select --</option>';

  if (!inherent || inherent === "none") {
    percentDiv.classList.add("hidden");
    return;
  }

  percentDiv.classList.remove("hidden");

  let values = [];
  if (["enchanted","stance","above50"].includes(inherent)) {
    values = [13,14];
  } 
  if (["below50","hexed"].includes(inherent)) {
    values = [15,16,17,18];
  }

  values.forEach(v => percentSelect.add(new Option(v + "%", v)));
}
  
function checkItem() {
  const type = document.getElementById("itemType").value;

  if (type === "staff") {
    const tier = calculateTier();
    document.getElementById("result").innerText = `Item Tier: ${tier}`;
    return;
  }

  document.getElementById("result").innerText = `${type} logic not added yet`;
  }
</script>
</body>
