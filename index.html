<!DOCTYPE html>
<html>
<head>
  <title>Pre-Searing Item Tiers – WIP!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      /*
        ============================================================
        GLOBAL PAGE STYLING
        ============================================================
        Dark theme, compact form layout, and helper classes for
        hiding sections, disclaimers, and bottom links.
      */
      body {
        background: black;
        color: #cccccc;
        font-family: Arial, sans-serif;
        padding: 20px;
      }
    
      .itemFields label,
      .topField label,
      #martialSharedFields label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
      }
    
      .itemFields select,
      .topField select,
      #martialSharedFields select {
        background: black;
        color: #cccccc;
        border: 1px solid #cccccc;
        padding: 6px;
        display: block;
        margin-top: 4px;
        margin-bottom: 16px;
      }
    
      .noReqSliderWrap {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        margin-bottom: 10px;
      }
    
      #no_req_slider,
      #modifier_type_slider {
        -webkit-appearance: none;
        appearance: none;
        width: 80px;
        height: 12px;
        background: #444;
        border-radius: 6px;
        outline: none;
      }
    
      #no_req_slider::-webkit-slider-thumb,
      #modifier_type_slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 22px;
        height: 22px;
        background: #cccccc;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid black;
      }
    
      #no_req_slider::-moz-range-thumb,
      #modifier_type_slider::-moz-range-thumb {
        width: 22px;
        height: 22px;
        background: #cccccc;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid black;
      }
    
      #checkItemButton {
        background: #cccccc;
        color: black;
        border: 1px solid black;
        padding: 6px 10px;
        margin-top: 20px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
      }
    
      .compact select,
      .compact input[type="checkbox"] {
        margin-bottom: 12px;
      }
    
      .header-red {
        color: #8a090c;
      }
    
      .hidden {
        display: none !important;
      }
    
      h3 {
        margin-top: 24px;
      }
    
      .noReqRow {
        margin-top: 12px;
        margin-bottom: 12px;
      }
    
      .noReqRow label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: bold;
      }
    
      .subtle {
        color: #999999;
        font-size: 0.95em;
        margin-top: -8px;
        margin-bottom: 12px;
      }
    
      .disclaimerBox {
        display: block;
        width: fit-content;
        max-width: 100%;
        margin-top: 30px;
        margin-bottom: 18px;
        padding: 10px 12px;
        border: 1px solid #555;
        background: #111;
        color: #bbbbbb;
        white-space: pre-line;
      }
    
      .bottomLinks {
        display: block;
        width: fit-content;
        max-width: 100%;
        margin-top: 0;
        border-top: 1px solid #333;
        padding-top: 16px;
      }
    
      .bottomLinks a {
        color: #cccccc;
      }
    
      .bottomLinks div {
        margin-top: 6px;
      }
    
      .bottomLinks div:first-child {
        margin-top: 0;
      }
    </style>
</head>
<body>

  <!--
    ============================================================
    HEADER + ITEM TYPE SELECTION
    ============================================================
    Main entry point. The selected item type controls which fields
    are shown below.
  -->
  <h2 class="header-red">Pre-Searing Item Tiers – ⚠ WIP</h2>

  <div class="topField">
    <label>Item Type:</label>
    <select id="itemType" onchange="showFields()">
      <option value="">-- Select --</option>
      <option value="axe">Axe</option>
      <option value="bow">Bow</option>
      <option value="focus">Focus</option>
      <option value="hammer">Hammer</option>
      <option value="shield">Shield</option>
      <option value="staff">Staff</option>
      <option value="sword">Sword</option>
      <option value="wand">Wand</option>
      <option value="misc">Miscellaneous</option>
    </select>
  </div>
  
  <!--
    ============================================================
    WEAPON / PREFIX / SUFFIX TOGGLE
    ============================================================
    Only used for staff, axe, sword, hammer, bow.
    Slider values:
      0 = prefix
      1 = weapon
      2 = suffix
  -->
  <div id="modifierTypeContainer" class="hidden">
    <label for="modifier_type_slider"><strong>Check:</strong></label>
    <div class="noReqSliderWrap">
      <span>Prefix</span>
      <input
        type="range"
        id="modifier_type_slider"
        min="0"
        max="2"
        step="1"
        value="1"
        oninput="modifierTypeChanged()"
      >
      <span>Suffix</span>
    </div>
    <div class="subtle">Middle position = Weapon</div>
  </div>
  
  <!--
    ============================================================
    NO-REQ TOGGLE
    ============================================================
    Shared slider for all item types.
    Slider values:
      0 = yes
      1 = unset
      2 = no
  -->
  <div id="noReqContainer" class="hidden">
    <label for="no_req_slider"><strong>No Req?</strong></label>
    <div class="noReqSliderWrap">
      <span>Yes</span>
      <input
        type="range"
        id="no_req_slider"
        min="0"
        max="2"
        step="1"
        value="1"
        oninput="noReqChanged()"
      >
      <span>No</span>
    </div>
  </div>

  <!--
    ============================================================
    STAFF FIELDS
    ============================================================
    Staffs use HSR, Energy, inherent type, and optionally HCT
    attribute + HCT percent if the inherent is HCT.
  -->
  <div class="itemFields hidden" data-type="staff">
    <label>HSR %:</label>
    <select id="staff_hsr">
      <option value="">-- Select --</option>
    </select>

    <label>Energy:</label>
    <select id="staff_energy">
      <option value="">-- Select --</option>
    </select>

    <label>Inherent Modifier:</label>
    <select id="staff_inherent" onchange="inherentChanged()">
      <option value="">-- Select --</option>
      <option value="none">None</option>
      <option value="reduces_duration">Reduces condition duration</option>
      <option value="hct">HCT</option>
    </select>

    <div id="hctAttributeDiv" class="hidden compact">
      <label>HCT Attribute:</label>
      <select id="staff_attr" onchange="hctAttributeChanged()">
        <option value="">-- Select --</option>
        <option value="generic">Generic</option>
        <option value="air">Air</option>
        <option value="blood">Blood</option>
        <option value="curses">Curses</option>
        <option value="death">Death</option>
        <option value="divine">Divine Favor</option>
        <option value="dom">Domination</option>
        <option value="earth">Earth</option>
        <option value="fire">Fire</option>
        <option value="heal">Heal</option>
        <option value="illu">Illusion</option>
        <option value="prot">Prot</option>
        <option value="smite">Smite</option>
        <option value="water">Water</option>
      </select>
    </div>

    <div id="hctPercentDiv" class="hidden compact">
      <label>HCT %:</label>
      <select id="staff_hct_percent">
        <option value="">-- Select --</option>
      </select>
    </div>
  </div>

  <!--
    ============================================================
    MARTIAL-SPECIFIC MAIN FIELDS
    ============================================================
    Each martial type has its own base damage input.
    Bows additionally have a skin field because skin affects value.
  -->
  <div class="itemFields hidden" data-type="axe">
    <label>Damage Range:</label>
    <select id="axe_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="sword">
    <label>Damage Range:</label>
    <select id="sword_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="hammer">
    <label>Damage Range:</label>
    <select id="hammer_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="bow">
    <label>Skin:</label>
    <select id="bow_skin">
      <option value="">-- Select --</option>
      <option value="flat">Flatbow</option>
      <option value="horn">Hornbow</option>
      <option value="long">Longbow</option>
      <option value="recurve">Recurve Bow</option>
      <option value="short">Shortbow</option>
    </select>

    <label>Damage Range:</label>
    <select id="bow_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <!--
    ============================================================
    PLACEHOLDER ITEM TYPES
    ============================================================
    These are wired into the UI already so they can be expanded later,
    but no tier logic exists for them yet.
  -->
  <div class="itemFields hidden" data-type="wand">
    <label>Wand logic placeholder</label>
  </div>

  <div class="itemFields hidden" data-type="shield">
    <label>Shield logic placeholder</label>
  </div>

  <div class="itemFields hidden" data-type="focus">
    <label>Focus logic placeholder</label>
  </div>

  <div class="itemFields hidden" data-type="misc">
    <label>Miscellaneous logic placeholder</label>
  </div>
  
  <div id="prefixPlaceholder" class="itemFields hidden">
    <label>Prefix logic placeholder</label>
  </div>

  <div id="suffixPlaceholder" class="itemFields hidden">
    <label>Suffix logic placeholder</label>
  </div>
  
  <!--
    ============================================================
    MARTIAL SHARED MODIFIER FIELDS
    ============================================================
    Shared by axe, sword, hammer, and bow.
    Covers inherent damage modifier, percent roll, and special
    skin-related questions such as piercing axes and shortswords.
  -->
  <div id="martialSharedFields" class="hidden">
    <label>Inherent Damage Increase:</label>
    <select id="weapon_inherent" onchange="weaponInherentChanged()">
      <option value="">-- Select --</option>
      <option value="none">None</option>
      <option value="above50">while Health is above 50%</option>
      <option value="below50">while Health is below 50%</option>
      <option value="enchanted">while Enchanted</option>
      <option value="hexed">while Hexed</option>
      <option value="stance">while in a Stance</option>
      <option value="hexedfoes">vs. Hexed foes</option>
    </select>

    <div id="weaponDamagePercentDiv" class="hidden">
      <label>Damage Increase %:</label>
      <select id="weapon_damage_percent" onchange="updateSpecialQuestionVisibility()">
        <option value="">-- Select --</option>
      </select>
    </div>

    <div id="specialQuestionFields" class="hidden">
      <div id="axePiercingRow" class="hidden noReqRow">
        <label>
          <input type="checkbox" id="axe_piercing">
          Piercing Axe?
        </label>
      </div>

      <div id="swordShortRow" class="hidden noReqRow">
        <label>
          <input type="checkbox" id="sword_short">
          Short Sword?
        </label>
      </div>
    </div>
  </div>

  <!--
    ============================================================
    ACTION + OUTPUT AREA
    ============================================================
  -->
  <button id="checkItemButton" onclick="checkItem()" class="hidden">
    Check Item
  </button>

  <h3 id="result"></h3>
  <div id="debug" class="subtle"></div>

  <!--
    ============================================================
    DYNAMIC DISCLAIMER BOX
    ============================================================
  -->
  <div id="itemDisclaimer" class="disclaimerBox hidden"></div>

  <!--
    ============================================================
    BOTTOM LINKS
    ============================================================
  -->
  <div class="bottomLinks">
    <div>
      <a href="https://discord.gg/B3JfepPu" target="_blank" rel="noopener noreferrer">
        <strong>Pre-Searing Discord</strong>
      </a>
    </div>
    
    <div>
      <a href="ADD-FAQ-LINK-HERE" target="_blank" rel="noopener noreferrer">
        <strong>Item FAQ</strong>
      </a>
      – Explanation of prefix / inherent / suffix / HSR / HCT
    </div>
  </div>

  <script>
    /*
      ============================================================
      GLOBAL TYPE GROUPS
      ============================================================
    */
    const MARTIAL_TYPES = ["axe", "sword", "hammer", "bow"];
    const PLACEHOLDER_TYPES = ["wand", "shield", "focus", "misc"];
    const MODIFIER_SUPPORTED_TYPES = ["staff", "axe", "sword", "hammer", "bow"];

    /*
      ============================================================
      HARDcoded MARTIAL TIER FOUNDATION
      ============================================================
      This mirrors the staff setup and is the place to add exact
      special-case martial results later.

      Intended use:
      - especially for no-req martial exceptions
      - but can also be used for req martial edge cases if wanted

      Example entry shape:
      { noReq: "yes", damage: "6-12", inherent: "above50", percent: "14", skin: "", tier: "Collectable" }

      For bow, skin should be "horn", "flat", etc.
      For axe, skin should be "" or "piercing".
      For sword, skin should be "" or "short".
      For hammer, skin is usually "".
    */
    const hardcodedMartialTierMappings = {
      axe: [
        {
          noReq: "yes",
          damage: "6-12",
          inherent: "above50",
          percent: "14",
          tier: "Highly Collectable"
        },
        {
          noReq: "yes",
          damage: "6-12",
          inherent: "hexed",
          percent: "18",
          tier: "Highly Collectable"
        },
        {

          damage: "",
          inherent: ["above50", "below50", "enchanted", "hexed", "stance", "hexedfoes"],
          percent: "",
          tier: "Collectable"
        }
      ],
    
      sword: [
        {
          noReq: "yes",
          damage: "8-10",
          inherent: "above50",
          percent: "14",
          tier: "Highly Collectable"
        },
        {
          noReq: "yes",

        },
        {
          noReq: "yes",
          damage: "",
          inherent: ["above50", "below50", "enchanted", "hexed", "stance", "hexedfoes"],
          percent: "",
          tier: "Collectable"
        }
      ],
    
      hammer: [
        {
          noReq: "yes",
          damage: "11-15",
          inherent: "above50",
          percent: "14",
          tier: "Highly Collectable"
        },
        {
          noReq: "yes",
          damage: "11-15",
          inherent: "hexed",
          percent: "18",
          tier: "Highly Collectable"
        },
        {
          noReq: "yes",
          damage: "",
          inherent: ["above50", "below50", "enchanted", "hexed", "stance", "hexedfoes"],
          percent: "",
          tier: "Collectable"
        }
      ],
    
      bow: [
        {
          noReq: "yes",
          skin: ["horn", "flat", "recurve", "long"],
          damage: "9-13",
          inherent: ["above50", "stance"],
          percent: "14",
          tier: "Highly Collectable"
        },
        {
          noReq: "yes",
          skin: "",
          damage: "",
          inherent: ["above50", "below50", "enchanted", "hexed", "stance", "hexedfoes"],
          percent: "",
          tier: "Collectable"
        }
      ]
    };

    /*
      ============================================================
      REQUIRED MARTIAL SCORING CONFIGS
      ============================================================
      Each martial weapon has:
      - damageScores: how valuable a damage range is
      - skinMode / skinValues: skin bonus or malus handling
      - inherentBonuses: value of the inherent type itself
      - percentBonuses: value of the % roll for that inherent
      - thresholds: final score cutoffs for tier naming

      Sword uses your axe logic with sword damage ranges and a
      shortsword malus.
      Hammer uses similar logic but without a skin malus.
    */
    const martialReqConfigs = {
      bow: {
        damageScores: {
          "11-16": 0,
          "11-17": 1,
          "11-18": 2,
          "11-19": 4,
          "12-18": 4,
          "12-19": 8,
          "12-20": 16,
          "12-21": 48
        },
        skinMode: "bonus",
        skinValues: {
          short: 1,
          long: 1.5,
          recurve: 2,
          flat: 2.5,
          horn: 3
        },
        inherentBonuses: {
          none: 1,
          hexedfoes: 1,
          below50: 1,
          enchanted: 1.5,
          hexed: 2,
          stance: 2.5,
          above50: 3
        },
        percentBonuses: {
          enchanted: { "13": 2, "14": 3 },
          stance:    { "13": 3, "14": 4 },
          above50:   { "13": 3, "14": 4 },
          hexedfoes: { "13": 2, "14": 3 },
          hexed:     { "15": 2, "16": 3, "17": 3, "18": 4 },
          below50:   { "15": 2, "16": 3, "17": 3, "18": 4 }
        },
        thresholds: {
          god: 400,
          high: 200,
          mid: 100,
          low: 20
        }
      },

      axe: {
        damageScores: {
          "6-15": 0,
          "6-16": 1,
          "6-17": 2,
          "6-18": 4,
          "6-19": 8,
          "7-18": 8,
          "6-20": 16,
          "7-19": 16,
          "7-20": 48
        },
        skinMode: "malus",
        skinValues: {
          "": 1,
          piercing: 3
        },
        inherentBonuses: {
          none: 1,
          hexedfoes: 1,
          below50: 1.5,
          enchanted: 2,
          stance: 3,
          hexed: 4,
          above50: 5
        },
        percentBonuses: {
          enchanted: { "13": 2, "14": 3 },
          stance:    { "13": 2, "14": 3 },
          above50:   { "13": 3, "14": 4 },
          hexedfoes: { "13": 2, "14": 3 },
          hexed:     { "15": 2, "16": 3, "17": 3, "18": 4 },
          below50:   { "15": 2, "16": 3, "17": 3, "18": 4 }
        },
        thresholds: {
          god: 250,
          high: 100,
          mid: 30,
          low: 6
        }
      },

      sword: {
        damageScores: {
          "10-13": 0,
          "10-14": 1,
          "11-14": 2,
          "11-15": 4,
          "11-16": 8,
          "12-16": 16,
          "12-17": 48
        },
        skinMode: "malus",
        skinValues: {
          "": 1,
          short: 2
        },
        inherentBonuses: {
          none: 1,
          hexedfoes: 1.5,
          below50: 1.5,
          enchanted: 2,
          stance: 3,
          hexed: 4,
          above50: 5
        },
        percentBonuses: {
          enchanted: { "13": 2, "14": 3 },
          stance:    { "13": 2, "14": 3 },
          above50:   { "13": 3, "14": 4 },
          hexedfoes: { "13": 2, "14": 3 },
          hexed:     { "15": 2, "16": 3, "17": 3, "18": 4 },
          below50:   { "15": 2, "16": 3, "17": 3, "18": 4 }
        },
        thresholds: {
          god: 250,
          high: 100,
          mid: 30,
          low: 6
        }
      },

      hammer: {
        damageScores: {
          "14-21": 0,
          "14-22": 1,
          "14-23": 2,
          "14-24": 4,
          "15-24": 8,
          "15-25": 16,
          "15-26": 48
        },
        skinMode: "flat",
        skinValues: {
          "": 1
        },
        inherentBonuses: {
          none: 1,
          hexedfoes: 1.5,
          below50: 1.5,
          enchanted: 2,
          stance: 3,
          hexed: 4,
          above50: 5
        },
        percentBonuses: {
          enchanted: { "13": 2, "14": 3 },
          stance:    { "13": 2, "14": 3 },
          above50:   { "13": 3, "14": 4 },
          hexedfoes: { "13": 2, "14": 3 },
          hexed:     { "15": 2, "16": 3, "17": 3, "18": 4 },
          below50:   { "15": 2, "16": 3, "17": 3, "18": 4 }
        },
        thresholds: {
          god: 250,
          high: 180,
          mid: 60,
          low: 30
        }
      }
    };

    /*
      ============================================================
      STAFF ATTRIBUTE GROUPS
      ============================================================
      Staff HCT attributes are split into:
      - premium
      - normal
      - collector
    */
    const premiumStaffAttr = new Set(["fire", "death"]);
    const normalStaffAttr = new Set(["blood", "curses", "smite", "heal", "dom"]);
    const collectorStaffAttr = new Set(["air", "water", "earth", "prot", "divine", "illu"]);

    /*
      ============================================================
      REQUIRED STAFF BASE SCORE TABLES
      ============================================================
      These are only used for req staffs.
      No-req staffs are handled by hardcoded logic later in the file.
    */
    const staffReqHsrScores = {
      "11": 1,
      "12": 1.5,
      "13": 2,
      "14": 4,
      "15": 8,
      "16": 24
    };

    const staffReqEnergyBonuses = {
      "5": 1,
      "6": 1.5,
      "7": 2,
      "8": 3
    };

    /*
      ============================================================
      SIMPLE VALUE HELPERS
      ============================================================
      These convert staff attribute / HCT choices into numeric score
      multipliers used by the staff scoring formula.
    */
    function getStaffAttrBonus(attr) {
      if (!attr) return 1;
      if (attr === "generic") return 2;
      if (premiumStaffAttr.has(attr)) return 8;
      if (normalStaffAttr.has(attr)) return 4;
      if (collectorStaffAttr.has(attr)) return 2;
      return 1;
    }

    function getStaffHctPercentBonus(attr, pct) {
      if (!pct) return 1;

      if (attr === "generic") {
        if (pct === "9") return 32;
        if (pct === "8") return 8;
        return 1;
      }

      if (pct === "18") return 16;
      if (pct === "17") return 4;
      if (pct === "16") return 2;
      if (pct === "15") return 2;
      return 1;
    }

    /*
      ============================================================
      HARDcoded NO-REQ STAFF TIERS
      ============================================================
      This completely handles the special no-req staff cases you
      wanted to rely on directly instead of scoring them numerically.
    */
    function getHardcodedStaffTier(criteria) {
      const isNoReq = criteria.noReq === "yes";

      if (!isNoReq) return "";

      if (
        premiumStaffAttr.has(criteria.attr) &&
        criteria.energy === "6" &&
        criteria.hsr === "14" &&
        criteria.hctPercent === "18"
      ) {
        return "Highly Collectable";
      }

      if (
        (premiumStaffAttr.has(criteria.attr) && criteria.energy === "6" && criteria.hsr === "13" && criteria.hctPercent === "18") ||
        (premiumStaffAttr.has(criteria.attr) && criteria.energy === "5" && criteria.hsr === "14" && criteria.hctPercent === "18") ||
        (criteria.energy === "6" && criteria.hsr === "14" && criteria.hctPercent === "18") ||
        (criteria.energy === "6" && criteria.hsr === "14" && criteria.hctPercent === "9")
      ) {
        return "Collectable";
      }

      return "";
    }

    /*
      ============================================================
      HARDcoded MARTIAL TIER LOOKUP
      ============================================================
      Checks the dedicated hardcoded martial mapping tables first.
      This is the clean foundation for special-case martial results,
      exactly like the staff setup above.
    */
    function getHardcodedMartialTier(criteria) {
      const mappings = hardcodedMartialTierMappings[criteria.type] || [];
      if (mappings.length === 0) return "";

      const match = findTier(
        criteria,
        mappings,
        ["skin", "noReq", "damage", "inherent", "percent"]
      );

      if (!match || !match.tier || match.tier === "Junk") {
        return "";
      }

      return match.tier;
    }

    /*
      ============================================================
      REQUIRED STAFF SCORE FORMULA
      ============================================================
      Formula:
        hsrScore * (inherentMultiplier * attrBonus * hctPercentBonus) * energyBonus

      This only applies to req staffs.
      No-req staffs first go through the hardcoded logic above.
    */
    function scoreStaff(criteria) {
      const hsrScore = staffReqHsrScores[criteria.hsr] ?? 0;
      const energyBonus = staffReqEnergyBonuses[criteria.energy] ?? 1;

      let inherentMultiplier = 1;
      let attrBonus = 1;
      let hctPercentBonus = 1;

      if (criteria.inherent === "none") {
        inherentMultiplier = 1;
      } else if (criteria.inherent === "reduces_duration") {
        inherentMultiplier = 1.2;
      } else if (criteria.inherent === "hct") {
        inherentMultiplier = 2;
        attrBonus = getStaffAttrBonus(criteria.attr);
        hctPercentBonus = getStaffHctPercentBonus(criteria.attr, criteria.hctPercent);
      }

      const modBlock = inherentMultiplier * attrBonus * hctPercentBonus;
      const totalScore = hsrScore * modBlock * energyBonus;

      return {
        totalScore,
        breakdown: {
          hsrScore,
          energyBonus,
          inherentMultiplier,
          attrBonus,
          hctPercentBonus,
          modBlock
        }
      };
    }

    /*
      ============================================================
      REQUIRED STAFF SCORE -> TIER
      ============================================================
    */
    function staffScoreToTier(score) {
      if (score >= 6000) return "God Tier";
      if (score >= 3000) return "High End";
      if (score >= 2000) return "Mid Tier";
      if (score >= 50) return "Low End";
      return "Junk";
    }

    /*
      ============================================================
      COLLECTOR STAFF REMAPPING
      ============================================================
      Collector-attribute req staffs get remapped away from the
      normal req-staff labels:
      - High End / God Tier -> Highly Collectable
      - Mid Tier -> Collectable

      No-req staffs are excluded because those are already hardcoded.
    */
    function remapCollectorStaffTier(criteria, tier) {
      if (criteria.noReq === "yes") return tier;
      if (!collectorStaffAttr.has(criteria.attr)) return tier;

      if (tier === "God Tier" || tier === "High End") {
        return "Highly Collectable";
      }

      if (tier === "Mid Tier") {
        return "Collectable";
      }

      return tier;
    }

    /*
      ============================================================
      GENERIC MAPPING MATCHER
      ============================================================
      Used by both:
      - the temporary old martial fallback
      - the new hardcoded martial foundation
    */
    function findTier(criteria, mappings, keys) {
      for (const mapping of mappings) {
        let matched = true;
    
        for (const key of keys) {
          const mappingValue = mapping[key] ?? "";
          const criteriaValue = criteria[key] ?? "";
    
          if (mappingValue === "") {
            continue;
          }
    
          if (Array.isArray(mappingValue)) {
            if (!mappingValue.includes(criteriaValue)) {
              matched = false;
              break;
            }
          } else if (mappingValue !== criteriaValue) {
            matched = false;
            break;
          }
        }
    
        if (matched) {
          return mapping;
        }
      }
    
      return { tier: "Junk" };
    }

    /*
      ============================================================
      REQUIRED MARTIAL SCORE CALCULATION
      ============================================================
    */
    function scoreReqMartial(type, criteria) {
      const config = martialReqConfigs[type];
      if (!config) {
        return {
          totalScore: 0,
          breakdown: {
            damageScore: 0,
            skinValue: 1,
            inherentBonus: 1,
            percentBonus: 1,
            baseScore: 0,
            modMultiplier: 1,
            skinMode: "flat"
          }
        };
      }

      const damageScore = config.damageScores[criteria.damage] ?? 0;
      const inherentKey = criteria.inherent || "none";
      const inherentBonus = config.inherentBonuses[inherentKey] ?? 1;
      const percentBonus = config.percentBonuses[inherentKey]?.[criteria.percent] ?? 1;
      const skinValue = config.skinValues[criteria.skin] ?? 1;

      const baseScore = config.skinMode === "bonus"
        ? damageScore * skinValue
        : damageScore;

      const modMultiplier = inherentKey === "none"
        ? inherentBonus
        : inherentBonus * percentBonus;

      let totalScore = baseScore * modMultiplier;

      if (config.skinMode === "malus") {
        totalScore = totalScore / skinValue;
      }

      return {
        totalScore,
        breakdown: {
          damageScore,
          skinValue,
          inherentBonus,
          percentBonus,
          baseScore,
          modMultiplier,
          skinMode: config.skinMode
        }
      };
    }

    /*
      ============================================================
      REQUIRED MARTIAL SCORE -> TIER
      ============================================================
    */
    function reqMartialScoreToTier(type, score) {
      const thresholds = martialReqConfigs[type]?.thresholds;
      if (!thresholds) return "Junk";

      if (score >= thresholds.god) return "God Tier";
      if (score >= thresholds.high) return "High End";
      if (score >= thresholds.mid) return "Mid Tier";
      if (score >= thresholds.low) return "Low End";
      return "Junk";
    }

    /*
      ============================================================
      CRITERIA READERS
      ============================================================
    */
    function getStaffCriteria() {
      return {
        noReq: getNoReqValue(),
        hsr: document.getElementById("staff_hsr").value,
        energy: document.getElementById("staff_energy").value,
        inherent: document.getElementById("staff_inherent").value,
        attr: document.getElementById("staff_attr").value,
        hctPercent: document.getElementById("staff_hct_percent").value
      };
    }

    function getMartialCriteria(type) {
      let skin = "";

      if (type === "bow") {
        skin = document.getElementById("bow_skin").value;
      }

      if (type === "axe") {
        skin = document.getElementById("axe_piercing").checked ? "piercing" : "";
      }

      if (type === "sword") {
        skin = document.getElementById("sword_short").checked ? "short" : "";
      }

      return {
        type,
        skin,
        noReq: getNoReqValue(),
        damage: document.getElementById(type + "_damage").value,
        inherent: document.getElementById("weapon_inherent").value,
        percent: document.getElementById("weapon_damage_percent").value
      };
    }

    /*
      ============================================================
      INPUT VALIDATION
      ============================================================
    */
    function validateStaffInput(criteria) {
      if (!criteria.noReq) {
        return "Please choose Yes or No for No Req?.";
      }

      if (!criteria.hsr || !criteria.energy || !criteria.inherent) {
        return "Please complete all required staff fields.";
      }

      if (criteria.inherent === "hct" && !criteria.attr) {
        return "Please select the HCT attribute.";
      }

      if (criteria.inherent === "hct" && !criteria.hctPercent) {
        return "Please select the HCT %.";
      }

      return "";
    }

    function validateMartialInput(criteria) {
      if (!criteria.noReq) {
        return "Please choose Yes or No for No Req?.";
      }

      if (criteria.type === "bow" && !criteria.skin) {
        return "Please select the bow skin.";
      }

      if (!criteria.damage) {
        return "Please select the damage range.";
      }

      if (!criteria.inherent) {
        return "Please select the inherent damage increase.";
      }

      if (criteria.inherent !== "none" && !criteria.percent) {
        return "Please select the damage increase %.";
      }

      return "";
    }

    /*
      ============================================================
      STAFF TIER CALCULATION
      ============================================================
      Order:
      1. validate
      2. normalize HCT-only fields
      3. check hardcoded no-req staff rules
      4. otherwise score req staff numerically
      5. remap collector req staffs if needed
    */
    function calculateStaffTier() {
      const criteria = getStaffCriteria();
      const validationMessage = validateStaffInput(criteria);

      if (validationMessage) {
        return { error: validationMessage };
      }

      const normalizedCriteria = {
        ...criteria,
        attr: criteria.inherent === "hct" ? criteria.attr : "",
        hctPercent: criteria.inherent === "hct" ? criteria.hctPercent : ""
      };

      const hardcodedTier = getHardcodedStaffTier(normalizedCriteria);
      if (hardcodedTier) {
        return {
          tier: hardcodedTier,
          score: "hardcoded",
          breakdown: {
            hsrScore: "hardcoded",
            inherentMultiplier: "hardcoded",
            attrBonus: "hardcoded",
            hctPercentBonus: "hardcoded",
            modBlock: "hardcoded",
            energyBonus: "hardcoded"
          }
        };
      }

      const scoreResult = scoreStaff(normalizedCriteria);

      let tier = staffScoreToTier(scoreResult.totalScore);
      tier = remapCollectorStaffTier(normalizedCriteria, tier);

      return {
        tier,
        score: scoreResult.totalScore,
        breakdown: scoreResult.breakdown
      };
    }

    /*
      ============================================================
      MARTIAL TIER CALCULATION
      ============================================================
      Order:
      1. validate
      2. normalize criteria
      3. check hardcoded martial rules first
      4. if req, use req martial score system
      5. otherwise return Junk for unmatched no-req items
    
      This gives martial weapons the same hardcoded-first structure
      that staffs already use.
    */
    function calculateMartialTier(type) {
    
      const criteria = getMartialCriteria(type);
      const validationMessage = validateMartialInput(criteria);
    
      if (validationMessage) {
        return { error: validationMessage };
      }
    
      const normalizedCriteria = {
        ...criteria,
        inherent: criteria.inherent === "none" ? "none" : criteria.inherent,
        percent: criteria.inherent === "none" ? "" : criteria.percent
      };
    
      const hardcodedTier = getHardcodedMartialTier(normalizedCriteria);
      if (hardcodedTier) {
        return {
          tier: hardcodedTier,
          score: "hardcoded"
        };
      }
    
      if (normalizedCriteria.noReq === "no") {
    
        const scoreResult = scoreReqMartial(type, normalizedCriteria);
        const tier = reqMartialScoreToTier(type, scoreResult.totalScore);
    
        return {
          tier,
          score: scoreResult.totalScore,
          breakdown: scoreResult.breakdown
        };
      }
    
      return { tier: "Junk" };
    }

    /*
      ============================================================
      PLACEHOLDER TIER CALCULATION
      ============================================================
    */
    function calculatePlaceholderTier(type) {
      return {
        tier: "Logic not added yet.",
        info: `${type} framework added, but scoring rules are not defined yet.`
      };
    }

    /*
      ============================================================
      MAIN CHECK BUTTON HANDLER
      ============================================================
    */
    function checkItem() {
      const type = document.getElementById("itemType").value;
      const modifierType = getModifierTypeValue();
      const resultEl = document.getElementById("result");
      const debugEl = document.getElementById("debug");

      if (!type) {
        resultEl.innerText = "Please select an item type.";
        debugEl.innerText = "";
        return;
      }

      let result;

      if (usesModifierTypeSlider(type)) {
        if (modifierType === "prefix") {
          resultEl.innerText = "Prefix modifier logic has not been added yet.";
          debugEl.innerText = "";
          return;
        }

        if (modifierType === "suffix") {
          resultEl.innerText = "Suffix modifier logic has not been added yet.";
          debugEl.innerText = "";
          return;
        }

        if (modifierType !== "weapon") {
          resultEl.innerText = "Please choose Weapon, Prefix, or Suffix.";
          debugEl.innerText = "";
          return;
        }
      }

      if (type === "staff") {
        result = calculateStaffTier();
      } else if (MARTIAL_TYPES.includes(type)) {
        result = calculateMartialTier(type);
      } else if (PLACEHOLDER_TYPES.includes(type)) {
        result = calculatePlaceholderTier(type);
      } else {
        resultEl.innerText = "Logic not added yet.";
        debugEl.innerText = "";
        return;
      }

      if (result.error) {
        resultEl.innerText = result.error;
        debugEl.innerText = "";
        return;
      }

      resultEl.innerText = `${result.tier}`;

      if (result.breakdown) {
        if (type === "staff") {
          debugEl.innerText =
            `⚠ Tier attribution logic is still being finalized.\n\n` +
            `Score: ${result.score} | ` +
            `HSR: ${result.breakdown.hsrScore} | ` +
            `Inherent Mult: ${result.breakdown.inherentMultiplier} | ` +
            `Attr: ${result.breakdown.attrBonus} | ` +
            `HCT%: ${result.breakdown.hctPercentBonus} | ` +
            `Mod Block: ${result.breakdown.modBlock} | ` +
            `Energy Mult: ${result.breakdown.energyBonus}`;
          return;
        }

        const skinPart =
          result.breakdown.skinMode === "bonus"
            ? `Skin Bonus: ${result.breakdown.skinValue} | `
            : result.breakdown.skinMode === "malus"
            ? `Skin Malus: ${result.breakdown.skinValue} | `
            : "";

        debugEl.innerText =
          `Score: ${result.score} | ` +
          `Damage: ${result.breakdown.damageScore} | ` +
          skinPart +
          `Inherent: ${result.breakdown.inherentBonus} | ` +
          `Percent: ${result.breakdown.percentBonus} | ` +
          `Base: ${result.breakdown.baseScore} | ` +
          `Multiplier: ${result.breakdown.modMultiplier}`;
      } else {
        debugEl.innerText = result.info || "";
      }
    }
  </script>
</body>
</html>
