<!DOCTYPE html>
<html>
<head>
  <title>Pre-Searing Item Tiers – WIP!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: black;
      color: #cccccc;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .itemFields label,
    .topField label,
    #martialSharedFields label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    .itemFields select,
    .topField select,
    #martialSharedFields select {
      background: black;
      color: #cccccc;
      border: 1px solid #cccccc;
      padding: 6px;
      display: block;
      margin-top: 4px;
      margin-bottom: 16px;
    }

    #checkItemButton {
      background: #cccccc;
      color: black;
      border: none;
      padding: 6px 10px;
      margin-top: 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    .compact select,
    .compact input[type="checkbox"] {
      margin-bottom: 12px;
    }

    .header-red {
      color: #8a090c;
    }

    .hidden {
      display: none !important;
    }

    h3 {
      margin-top: 24px;
    }

    .noReqRow {
      margin-top: 12px;
      margin-bottom: 12px;
    }

    .noReqRow label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: bold;
    }

    .subtle {
      color: #999999;
      font-size: 0.95em;
      margin-top: -8px;
      margin-bottom: 12px;
      white-space: pre-line;
    }

    .disclaimerBox {
      display: block;
      width: fit-content;
      max-width: 100%;
      margin-top: 30px;
      margin-bottom: 18px;
      padding: 10px 12px;
      border: 1px solid #555;
      background: #111;
      color: #bbbbbb;
      white-space: pre-line;
    }

    .bottomLinks {
      display: block;
      width: fit-content;
      max-width: 100%;
      margin-top: 0;
      border-top: 1px solid #333;
      padding-top: 16px;
    }

    .bottomLinks a {
      color: #cccccc;
    }

    .bottomLinks div {
      margin-top: 6px;
    }

    .bottomLinks div:first-child {
      margin-top: 0;
    }
  </style>
</head>

  <h2 class="header-red">Pre-Searing Item Tiers – WIP</h2>

  <div class="topField">
    <label>Item Type:</label>
    <select id="itemType" onchange="showFields()">
      <option value="">-- Select --</option>
      <option value="axe">Axe</option>
      <option value="bow">Bow</option>
      <option value="focus">Focus</option>
      <option value="hammer">Hammer</option>
      <option value="shield">Shield</option>
      <option value="staff">Staff</option>
      <option value="sword">Sword</option>
      <option value="wand">Wand</option>
      <option value="misc">Miscellaneous</option>
    </select>
  </div>

  <div id="modifierTypeContainer" class="hidden topField">
    <label>Check Type:</label>
    <select id="modifierType" onchange="modifierTypeChanged()">
      <option value="">-- Select --</option>
      <option value="weapon">Base Weapon</option>
      <option value="prefix">Prefix Modifier</option>
      <option value="suffix">Suffix Modifier</option>
    </select>
  </div>

  <!-- STAFF -->
  <div class="itemFields hidden" data-type="staff">
    <label>Skin:</label>
    <select id="staff_skin" onchange="staffSkinChanged()">
      <option value="">-- Select --</option>
      <option value="air">Air</option>
      <option value="curses">Accursed</option>
      <option value="death">Bone</option>
      <option value="divine">Holy</option>
      <option value="dom">Inscribed</option>
      <option value="earth">Earth</option>
      <option value="fire">Fire</option>
      <option value="illu">Jewelled</option>
      <option value="smite">Smiting</option>
      <option value="water">Water</option>
    </select>

    <div id="staffEarthSpecificDiv" class="hidden compact">
      <label>Specifically:</label>
      <select id="staff_earth_specific" onchange="staffEarthSpecificChanged()">
        <option value="">-- Select --</option>
        <option value="core">Core</option>
        <option value="obsidian">Obsidian</option>
      </select>
    </div>

    <div id="staffNoReqRow" class="hidden noReqRow">
      <label>
        <input type="checkbox" id="staff_no_req" onchange="staffNoReqChanged()">
        No Req?
      </label>
    </div>

    <div id="staffMainFields" class="hidden">
      <label>HSR %:</label>
      <select id="staff_hsr" onchange="clearResult()">
        <option value="">-- Select --</option>
      </select>

      <label>Energy:</label>
      <select id="staff_energy" onchange="clearResult()">
        <option value="">-- Select --</option>
      </select>

      <label>Inherent Modifier:</label>

        <option value="none">None</option>
        <option value="reduces_duration">Reduces condition duration</option>
        <option value="hct">HCT</option>
      </select>

      <div id="hctAttributeDiv" class="hidden compact">
        <label>HCT Attribute:</label>
        <select id="staff_attr" onchange="hctAttributeChanged()">

        </select>
      </div>

      <div id="hctPercentDiv" class="hidden compact">
        <label>HCT %:</label>
        <select id="staff_hct_percent" onchange="clearResult()">
          <option value="">-- Select --</option>
        </select>
      </div>
    </div>
  </div>

    function getStaffAttrLabel(value) {
      const labels = {
        generic: "Generic",
        air: "Air",
        blood: "Blood",
        curses: "Curses",
        death: "Death",
        divine: "Divine Favor",
        dom: "Domination",
        earth: "Earth",
        fire: "Fire",
        heal: "Heal",
        illu: "Illusion",
        inspi: "Inspiration",
        prot: "Prot",
        smite: "Smite",
        water: "Water"
      };
      return labels[value] || value;
    }

    function getStaffSkinScore(skin) {
      if (!skin) return 1;
      return staffSkinScores[skin] ?? 1;
    }

    function getStaffEarthSpecificScore(skin, earthSpecific) {
      if (skin !== "earth") return 1;
      if (!earthSpecific) return 1;
      return staffEarthSpecificScores[earthSpecific] ?? 1;
    }

    function getStaffHctAttributeScore(attr) {
      if (!attr) return 1;
      return staffHctAttributeScores[attr] ?? 1;
    }

    function getStaffSameAttributeBonus(skin, attr) {
      if (!skin || !attr) return 1;
      return skin === attr ? 2 : 1;
    }

    function getStaffHctPercentScore(attr, pct) {
      if (!pct) return 1;

      if (attr === "generic") {
        if (pct === "9") return 32;
        if (pct === "8") return 8;
        return 1;
      }

      if (pct === "18") return 16;
      if (pct === "17") return 4;
      if (pct === "16") return 2;
      if (pct === "15") return 2;
      return 1;
    }

    function scoreStaff(criteria) {
      const hsrScore = staffHsrScores[criteria.hsr] ?? 0;
      const energyBonus = staffEnergyBonuses[criteria.energy] ?? 1;
      const skinScore = getStaffSkinScore(criteria.skin);
      const earthSpecificScore = getStaffEarthSpecificScore(criteria.skin, criteria.earthSpecific);

      let hctAttributeScore = 1;
      let sameAttributeBonus = 1;
      let hctPercentScore = 1;

      if (criteria.inherent === "hct") {
        hctAttributeScore = getStaffHctAttributeScore(criteria.attr);
        sameAttributeBonus = getStaffSameAttributeBonus(criteria.skin, criteria.attr);
        hctPercentScore = getStaffHctPercentScore(criteria.attr, criteria.hctPercent);
      }

      const totalScore =
        hsrScore *
        skinScore *
        earthSpecificScore *
        hctAttributeScore *
        sameAttributeBonus *
        hctPercentScore *
        energyBonus;

      return {
        totalScore,
        breakdown: {
          hsrScore,
          skinScore,
          earthSpecificScore,
          hctAttributeScore,
          sameAttributeBonus,
          hctPercentScore,
          energyBonus
        }
      };
    }

    function staffScoreToTier(score) {
      if (score >= 6000) return "God Tier";
      if (score >= 3000) return "High End";
      if (score >= 2000) return "Mid Tier";
      if (score >= 50) return "Low End";
      return "Junk";
    }

    function getHardcodedStaffTier(criteria) {
      const isNoReq = criteria.isNoReq;
      const isCollector = collectorStaffAttr.has(criteria.attr);
      const isPremium = premiumStaffAttr.has(criteria.attr);
      const isHct = criteria.inherent === "hct";

      if (isHct && isCollector && criteria.hsr === "16" && criteria.hctPercent === "18") {
        return "Highly Collectable";
      }

      if (isCollector && criteria.hsr === "16") {
        return "Collectable";
      }

      if (isHct && isCollector && criteria.hsr === "15" && criteria.hctPercent === "18") {
        return "Collectable";
      }

      if (!isNoReq) return "";

      if (isHct && isPremium && criteria.energy === "6" && criteria.hsr === "14" && criteria.hctPercent === "18") {
        return "Highly Collectable";
      }

      if (
        isHct &&
        (
          (isPremium && criteria.energy === "6" && criteria.hsr === "13" && criteria.hctPercent === "18") ||
          (isPremium && criteria.energy === "5" && criteria.hsr === "14" && criteria.hctPercent === "18") ||
          (criteria.energy === "6" && criteria.hsr === "14" && criteria.hctPercent === "18") ||
          (criteria.energy === "6" && criteria.hsr === "14" && criteria.hctPercent === "9")
        )
      ) {
        return "Collectable";
      }

      return "";
    }

    function getMartialSubtype(type, skin) {
      if (type === "axe" && SPECIAL_AXE_SKINS.has(skin)) {

      return type;

    function isOrLowerDamageOption(type, skin, damage) {
      if (!damage) return false;

      if (type === "axe") {
        if (SPECIAL_AXE_SKINS.has(skin)) {
          return damage === "5-12";
        }
        return damage === "6-15";
      }

      if (type === "sword") return damage === "10-13";
      if (type === "hammer") return damage === "14-21";
      if (type === "bow") return damage === "11-16";

      return false;

    function updateItemDisclaimer() {
      const type = document.getElementById("itemType").value;
      const modifierType = getModifierTypeValue();
      const disclaimerEl = document.getElementById("itemDisclaimer");

      if (!disclaimerEl) return;

      if (!type) {
        disclaimerEl.classList.add("hidden");
        disclaimerEl.innerText = "";
        return;
      }

      const messages = [
        "⚠ Tier attribution logic is still being finalized."
      ];

      if (type === "staff" || type === "wand") {
        messages.push("High damage range might increase the item tier, but is not taken into consideration here for simplicity's sake.");
      }

      if (MARTIAL_TYPES.includes(type)) {
        messages.push("Low attribute requirement might increase the item tier, but is not taken into consideration here for simplicity's sake.");
      }

      if (usesModifierTypeSlider(type) && !modifierType) {
        disclaimerEl.classList.remove("hidden");
        disclaimerEl.innerText = messages.join("\n\n");
        return;
      }

      disclaimerEl.classList.remove("hidden");
      disclaimerEl.innerText = messages.join("\n\n");
    }

      } else if (PLACEHOLDER_TYPES.includes(type)) {
        document.querySelectorAll(".itemFields").forEach(div => {
          const types = div.dataset.type ? div.dataset.type.split(",") : [];
          div.classList.toggle("hidden", !types.includes(type));

    function findTier(criteria, mappings, keys) {
      for (const mapping of mappings) {
        let matched = true;

        for (const key of keys) {
          const mappingValue = mapping[key] ?? "";
          const criteriaValue = criteria[key] ?? "";

          if (mappingValue === "") continue;

          if (Array.isArray(mappingValue)) {
            if (!mappingValue.includes(criteriaValue)) {
              matched = false;
              break;
            }
          } else if (mappingValue !== criteriaValue) {
            matched = false;
            break;
          }
        }

        if (matched) return mapping;
      }

      return { tier: "Junk" };
    }

    function getHardcodedMartialTier(criteria) {
      const mappings = hardcodedMartialTierMappings[criteria.type] || [];
      if (mappings.length === 0) return "";

      const match = findTier(
        criteria,
        mappings,
        ["skin", "noReq", "damage", "inherent", "percent"]
      );

      if (!match || !match.tier || match.tier === "Junk") {
        return "";
      }

      return match.tier;
    }

    function scoreReqMartial(type, criteria) {
      const config = getMartialConfig(type, criteria.skin);

      if (!config) {
        return {
          totalScore: 0,
          breakdown: {
            damageScore: 0,
            skinValue: 1,
            specificValue: 1,
            inherentBonus: 1,
            percentBonus: 1,
            baseScore: 0,
            modMultiplier: 1
          }
        };
      }

      const damageScore = config.damageScores[criteria.damage] ?? 0;
      const skinValue = config.skinValues[criteria.skin] ?? 1;
      const specificValue = getMartialSpecificMultiplier(type, criteria, config);

      const inherentKey = criteria.inherent || "none";
      const inherentBonus = config.inherentBonuses[inherentKey] ?? 1;
      const percentBonus = config.percentBonuses[inherentKey]?.[criteria.percent] ?? 1;

      const baseScore = damageScore * skinValue * specificValue;
      const modMultiplier = inherentKey === "none"
        ? inherentBonus
        : inherentBonus * percentBonus;

      const totalScore = baseScore * modMultiplier;

      return {
        totalScore,
        breakdown: {
          damageScore,
          skinValue,
          specificValue,
          inherentBonus,
          percentBonus,
          baseScore,
          modMultiplier
        }
      };
    }

    function reqMartialScoreToTier(type, score, skin = "") {
      const config = getMartialConfig(type, skin);
      const thresholds = config?.thresholds;
      if (!thresholds) return "Junk";

      if (score >= thresholds.god) return "God Tier";
      if (score >= thresholds.high) return "High End";
      if (score >= thresholds.mid) return "Mid Tier";
      if (score >= thresholds.low) return "Low End";
      return "Junk";
    }

    function getStaffCriteria() {
      return {
        skin: getStaffSkinValue(),
        earthSpecific: getStaffEarthSpecificValue(),
        isNoReq: isStaffNoReqChecked(),
        hsr: document.getElementById("staff_hsr").value,
        energy: document.getElementById("staff_energy").value,
        inherent: document.getElementById("staff_inherent").value,
        attr: document.getElementById("staff_attr").value,
        hctPercent: document.getElementById("staff_hct_percent").value
      };
    }

    function getMartialCriteria(type) {
      return {
        type,
        skin: document.getElementById(`${type}_skin`).value,
        hammerSpecific: type === "hammer" ? getHammerSpecificValue() : "",
        noReq: isMartialNoReqChecked(type) ? "yes" : "no",
        damage: document.getElementById(`${type}_damage`).value,
        inherent: document.getElementById("weapon_inherent").value,
        percent: document.getElementById("weapon_damage_percent").value
      };
    }

    function validateStaffInput(criteria) {
      if (!criteria.skin) return "Please select the staff skin.";
      if (criteria.skin === "earth" && !criteria.earthSpecific) return "Please select the specific Earth staff type.";
      if (!criteria.hsr || !criteria.energy || !criteria.inherent) return "Please complete all required staff fields.";
      if (criteria.inherent === "hct" && !criteria.attr) return "Please select the HCT attribute.";
      if (criteria.inherent === "hct" && !criteria.hctPercent) return "Please select the HCT %.";
      return "";
    }

    function validateMartialInput(criteria) {
      if (!criteria.skin) return "Please select the weapon skin.";
      if (criteria.type === "hammer" && criteria.skin === "war" && !criteria.hammerSpecific) {
        return "Please select the specific War Hammer type.";
      }
      if (!criteria.damage) return "Please select the damage range.";
      if (!criteria.inherent) return "Please select the inherent damage increase.";
      if (criteria.inherent !== "none" && !criteria.percent) return "Please select the damage increase %.";
      return "";
    }

    function calculateStaffTier() {
      const criteria = getStaffCriteria();
      const validationMessage = validateStaffInput(criteria);

      if (validationMessage) {
        return { error: validationMessage };
      }

      const normalizedCriteria = {
        ...criteria,
        attr: criteria.inherent === "hct" ? criteria.attr : "",
        hctPercent: criteria.inherent === "hct" ? criteria.hctPercent : ""
      };

      const hardcodedTier = getHardcodedStaffTier(normalizedCriteria);
      if (hardcodedTier) {
        return {
          tier: hardcodedTier,
          score: "hardcoded",
          breakdown: {
            hsrScore: "hardcoded",
            skinScore: "hardcoded",
            earthSpecificScore: "hardcoded",
            hctAttributeScore: "hardcoded",
            sameAttributeBonus: "hardcoded",
            hctPercentScore: "hardcoded",
            energyBonus: "hardcoded"
          }
        };
      }

      const scoreResult = scoreStaff(normalizedCriteria);
      const tier = staffScoreToTier(scoreResult.totalScore);

      return {
        tier,
        score: scoreResult.totalScore,
        breakdown: scoreResult.breakdown
      };
    }

    function calculateMartialTier(type) {
      const criteria = getMartialCriteria(type);
    
      if (isOrLowerDamageOption(type, criteria.skin, criteria.damage)) {
        return { tier: "Junk" };
      }
    
      const validationMessage = validateMartialInput(criteria);
      if (validationMessage) {
        return { error: validationMessage };
      }
    
      const normalizedCriteria = {
        ...criteria,
        inherent: criteria.inherent === "none" ? "none" : criteria.inherent,
        percent: criteria.inherent === "none" ? "" : criteria.percent
      };
    
      const hardcodedTier = getHardcodedMartialTier(normalizedCriteria);
      if (hardcodedTier) {
        return {
          tier: hardcodedTier,
          score: "hardcoded"
        };
      }
    
      if (normalizedCriteria.noReq === "no") {
        const scoreResult = scoreReqMartial(type, normalizedCriteria);
        const tier = reqMartialScoreToTier(type, scoreResult.totalScore, normalizedCriteria.skin);
    
        return {
          tier,
          score: scoreResult.totalScore,
          breakdown: scoreResult.breakdown
        };
      }
    
      return { tier: "Junk" };
    }

    function calculatePlaceholderTier(type) {
      return {
        tier: "Logic not added yet.",
        info: `${type} framework added, but scoring rules are not defined yet.`
      };
    }

    function checkItem() {
      const type = document.getElementById("itemType").value;
      const modifierType = getModifierTypeValue();
      const resultEl = document.getElementById("result");
      const debugEl = document.getElementById("debug");

      if (!type) {
        resultEl.innerText = "Please select an item type.";
        debugEl.innerText = "";
        return;
      }

      let result;

      if (usesModifierTypeSlider(type)) {
        if (!modifierType) {
          resultEl.innerText = "Please choose Base Weapon, Prefix Modifier, or Suffix Modifier.";
          debugEl.innerText = "";
          return;
        }

        if (modifierType === "prefix") {
          resultEl.innerText = "Prefix modifier logic has not been added yet.";
          debugEl.innerText = "";
          return;
        }

        if (modifierType === "suffix") {
          resultEl.innerText = "Suffix modifier logic has not been added yet.";
          debugEl.innerText = "";
          return;
        }
      }

      if (type === "staff") {
        result = calculateStaffTier();
      } else if (MARTIAL_TYPES.includes(type)) {
        result = calculateMartialTier(type);
      } else if (PLACEHOLDER_TYPES.includes(type)) {
        result = calculatePlaceholderTier(type);
      } else {
        resultEl.innerText = "Logic not added yet.";
        debugEl.innerText = "";
        return;
      }

      if (result.error) {
        resultEl.innerText = result.error;
        debugEl.innerText = "";
        return;
      }

      resultEl.innerText = `${result.tier}`;

      if (result.breakdown) {
        if (type === "staff") {
          debugEl.innerText =
            `Score: ${result.score} | ` +
            `HSR: ${result.breakdown.hsrScore} | ` +
            `Skin: ${result.breakdown.skinScore} | ` +
            `Earth Spec: ${result.breakdown.earthSpecificScore} | ` +
            `HCT Attr: ${result.breakdown.hctAttributeScore} | ` +
            `Same Attr: ${result.breakdown.sameAttributeBonus} | ` +
            `HCT%: ${result.breakdown.hctPercentScore} | ` +
            `Energy Mult: ${result.breakdown.energyBonus}`;
          return;
        }

        debugEl.innerText =
          `Score: ${result.score} | ` +
          `Damage: ${result.breakdown.damageScore} | ` +
          `Skin: ${result.breakdown.skinValue} | ` +
          `Specific: ${result.breakdown.specificValue} | ` +
          `Inherent: ${result.breakdown.inherentBonus} | ` +
          `Percent: ${result.breakdown.percentBonus} | ` +
          `Base: ${result.breakdown.baseScore} | ` +
          `Multiplier: ${result.breakdown.modMultiplier}`;
      } else {
        debugEl.innerText = result.info || "";
      }
    }
  </script>
