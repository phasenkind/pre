<!DOCTYPE html>
<html>
<head>
  <title>Pre-Searing Item Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: black;
      color: #cccccc;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .itemFields label,
    .topField label,
    #martialSharedFields label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    .itemFields select,
    .topField select,
    #martialSharedFields select {
      background: black;
      color: #cccccc;
      border: 1px solid #cccccc;
      padding: 6px;
      display: block;
      margin-top: 4px;
      margin-bottom: 16px;
    }

    .noReqSliderWrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    #no_req_slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 12px;
      background: #444;
      border-radius: 6px;
      outline: none;
    }

    #no_req_slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: #cccccc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid black;
    }

    #no_req_slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #cccccc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid black;
    }

    #checkItemButton {
      background: #cccccc;
      color: black;
      border: 1px solid black;
      padding: 6px 10px;
      margin-top: 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    .compact select,
    .compact input[type="checkbox"] {
      margin-bottom: 12px;
    }

    .header-red {
      color: #8a090c;
    }

    .hidden {
      display: none;
    }

    h3 {
      margin-top: 24px;
    }

    .noReqRow {
      margin-top: 12px;
      margin-bottom: 12px;
    }

    .noReqRow label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: bold;
    }

    .subtle {
      color: #999999;
      font-size: 0.95em;
      margin-top: -8px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <h2 class="header-red">Pre-Searing Item Checker</h2>

  <div class="topField">
    <label>Item Type:</label>
    <select id="itemType" onchange="showFields()">
      <option value="">-- Select --</option>
      <option value="staff">Staff</option>
      <option value="axe">Axe</option>
      <option value="sword">Sword</option>
      <option value="hammer">Hammer</option>
      <option value="bow">Bow</option>
      <option value="wand">Wand</option>
      <option value="shield">Shield</option>
      <option value="focus">Focus</option>
      <option value="misc">Miscellaneous</option>
    </select>
  </div>

  <div id="noReqContainer" class="hidden">
    <label for="no_req_slider"><strong>No Req?</strong></label>
    <div class="noReqSliderWrap">
      <span>Yes</span>
      <input
        type="range"
        id="no_req_slider"
        min="0"
        max="2"
        step="1"
        value="1"
        oninput="noReqChanged()"
      >
      <span>No</span>
    </div>
  </div>

  <div class="itemFields hidden" data-type="staff">
    <label>HSR %:</label>
    <select id="staff_hsr">
      <option value="">-- Select --</option>
    </select>

    <label>Energy:</label>
    <select id="staff_energy">
      <option value="">-- Select --</option>
    </select>

    <label>Inherent Modifier:</label>
    <select id="staff_inherent" onchange="inherentChanged()">
      <option value="">-- Select --</option>
      <option value="none">None</option>
      <option value="reduces_duration">Reduces condition duration</option>
      <option value="hct">HCT</option>
    </select>

    <div id="hctAttributeDiv" class="hidden compact">
      <label>HCT Attribute:</label>
      <select id="staff_attr" onchange="hctAttributeChanged()">
        <option value="">-- Select --</option>
        <option value="generic">Generic</option>
        <option value="fire">Fire</option>
        <option value="air">Air</option>
        <option value="water">Water</option>
        <option value="earth">Earth</option>
        <option value="death">Death</option>
        <option value="blood">Blood</option>
        <option value="curses">Curses</option>
        <option value="smite">Smite</option>
        <option value="heal">Heal</option>
        <option value="prot">Prot</option>
        <option value="divine">Divine Favor</option>
        <option value="dom">Domination</option>
        <option value="illu">Illusion</option>
      </select>
    </div>

    <div id="hctPercentDiv" class="hidden compact">
      <label>HCT %:</label>
      <select id="staff_hct_percent">
        <option value="">-- Select --</option>
      </select>
    </div>
  </div>

  <div class="itemFields hidden" data-type="axe">
    <label>Damage Range:</label>
    <select id="axe_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="sword">
    <label>Damage Range:</label>
    <select id="sword_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="hammer">
    <label>Damage Range:</label>
    <select id="hammer_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="bow">
    <label>Skin:</label>
    <select id="bow_skin">
      <option value="">-- Select --</option>
      <option value="short">Shortbow</option>
      <option value="recurve">Recurve Bow</option>
      <option value="long">Longbow</option>
      <option value="flat">Flatbow</option>
      <option value="horn">Hornbow</option>
    </select>

    <label>Damage Range:</label>
    <select id="bow_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="wand">
    <label>Wand logic placeholder</label>
    <div class="subtle">Add wand stats and scoring rules here later.</div>
  </div>

  <div class="itemFields hidden" data-type="shield">
    <label>Shield logic placeholder</label>
    <div class="subtle">Add shield stats and scoring rules here later.</div>
  </div>

  <div class="itemFields hidden" data-type="focus">
    <label>Focus logic placeholder</label>
    <div class="subtle">Add focus stats and scoring rules here later.</div>
  </div>

  <div class="itemFields hidden" data-type="misc">
    <label>Miscellaneous logic placeholder</label>
    <div class="subtle">Add miscellaneous item rules here later.</div>
  </div>

  <div id="martialSharedFields" class="hidden">
    <label>Inherent Damage Increase:</label>
    <select id="weapon_inherent" onchange="weaponInherentChanged()">
      <option value="">-- Select --</option>
      <option value="none">None</option>
      <option value="enchanted">while Enchanted</option>
      <option value="stance">while in a Stance</option>
      <option value="hexedfoes">vs. Hexed foes</option>
      <option value="above50">while Health is above 50%</option>
      <option value="below50">while Health is below 50%</option>
      <option value="hexed">while Hexed</option>
    </select>

    <div id="weaponDamagePercentDiv" class="hidden">
      <label>Damage Increase %:</label>
      <select id="weapon_damage_percent" onchange="updateSpecialQuestionVisibility()">
        <option value="">-- Select --</option>
      </select>
    </div>

    <div id="specialQuestionFields" class="hidden">
      <div id="axePiercingRow" class="hidden noReqRow">
        <label>
          <input type="checkbox" id="axe_piercing">
          Piercing Axe?
        </label>
      </div>

      <div id="swordShortRow" class="hidden noReqRow">
        <label>
          <input type="checkbox" id="sword_short">
          Shortsword?
        </label>
      </div>
    </div>
  </div>

  <button id="checkItemButton" onclick="checkItem()" class="hidden">
    Check Item
  </button>

  <h3 id="result"></h3>
  <div id="debug" class="subtle"></div>

  <script>
    const MARTIAL_TYPES = ["axe", "sword", "hammer", "bow"];
    const PLACEHOLDER_TYPES = ["wand", "shield", "focus", "misc"];

    /*
      Temporary fallback mappings for no-req martial weapons.
      Fill these in as you continue converting no-req items to score systems.
    */
    const martialTierMappings = [
      { type: "bow", skin: "horn", noReq: "yes", damage: "9-13", inherent: "above50", percent: "14", tier: "Highly Collectable" },
      { type: "bow", skin: "flat", noReq: "yes", damage: "9-13", inherent: "above50", percent: "14", tier: "Collectable" },
      { type: "axe", skin: "", noReq: "yes", damage: "6-12", inherent: "above50", percent: "14", tier: "Collectable" },
      { type: "sword", skin: "", noReq: "yes", damage: "8-10", inherent: "above50", percent: "14", tier: "Collectable" },
      { type: "hammer", skin: "", noReq: "yes", damage: "11-15", inherent: "above50", percent: "14", tier: "Collectable" },
      { type: "", skin: "", noReq: "", damage: "", inherent: "", percent: "", tier: "Junk" }
    ];

    /*
      Martial scoring configs.
      Sword uses your axe logic with sword damage ranges and shortsword malus.
      Hammer uses your axe logic with hammer damage ranges and no malus.
    */
    const martialReqConfigs = {
      bow: {
        damageScores: {
          "11-16": 0,
          "11-17": 1,
          "11-18": 2,
          "11-19": 5,
          "12-18": 5,
          "12-19": 10,
          "12-20": 20,
          "12-21": 80
        },
        skinMode: "bonus",
        skinValues: {
          short: 1,
          long: 2,
          recurve: 2,
          flat: 3,
          horn: 4
        },
        inherentBonuses: {
          none: 1,
          hexedfoes: 1,
          below50: 1,
          enchanted: 1,
          hexed: 2,
          stance: 3,
          above50: 4
        },
        percentBonuses: {
          enchanted: { "13": 2, "14": 3 },
          stance:    { "13": 2, "14": 3 },
          above50:   { "13": 2, "14": 3 },
          hexedfoes: { "13": 2, "14": 3 },
          hexed:     { "15": 2, "16": 2, "17": 2, "18": 3 },
          below50:   { "15": 2, "16": 2, "17": 2, "18": 3 }
        },
        thresholds: {
          god: 600,
          high: 200,
          mid: 100,
          low: 25
        }
      },

      axe: {
        damageScores: {
          "6-15": 0,
          "6-16": 2,
          "6-17": 4,
          "6-18": 8,
          "6-19": 16,
          "7-18": 16,
          "6-20": 32,
          "7-19": 32,
          "7-20": 64
        },
        skinMode: "malus",
        skinValues: {
          "": 1,
          piercing: 3
        },
        inherentBonuses: {
          none: 1,
          hexedfoes: 1,
          below50: 1,
          enchanted: 1,
          stance: 3,
          hexed: 3,
          above50: 4
        },
        percentBonuses: {
          enchanted: { "13": 2, "14": 3 },
          stance:    { "13": 2, "14": 3 },
          above50:   { "13": 3, "14": 4 },
          hexedfoes: { "13": 2, "14": 3 },
          hexed:     { "15": 2, "16": 3, "17": 3, "18": 4 },
          below50:   { "15": 2, "16": 3, "17": 3, "18": 4 }
        },
        thresholds: {
          god: 400,
          high: 200,
          mid: 100,
          low: 20
        }
      },

      sword: {
        damageScores: {
          "10-13": 0,
          "10-14": 2,
          "11-14": 4,
          "11-15": 8,
          "11-16": 16,
          "12-16": 32,
          "12-17": 64
        },
        skinMode: "malus",
        skinValues: {
          "": 1,
          short: 3
        },
        inherentBonuses: {
          none: 1,
          hexedfoes: 1,
          below50: 1,
          enchanted: 1,
          stance: 3,
          hexed: 3,
          above50: 4
        },
        percentBonuses: {
          enchanted: { "13": 2, "14": 3 },
          stance:    { "13": 2, "14": 3 },
          above50:   { "13": 3, "14": 4 },
          hexedfoes: { "13": 2, "14": 3 },
          hexed:     { "15": 2, "16": 3, "17": 3, "18": 4 },
          below50:   { "15": 2, "16": 3, "17": 3, "18": 4 }
        },
        thresholds: {
          god: 400,
          high: 200,
          mid: 100,
          low: 20
        }
      },

      hammer: {
        damageScores: {
          "14-21": 0,
          "14-22": 2,
          "14-23": 4,
          "14-24": 8,
          "15-24": 16,
          "15-25": 32,
          "15-26": 64
        },
        skinMode: "flat",
        skinValues: {
          "": 1
        },
        inherentBonuses: {
          none: 1,
          hexedfoes: 1,
          below50: 1,
          enchanted: 1,
          stance: 3,
          hexed: 3,
          above50: 4
        },
        percentBonuses: {
          enchanted: { "13": 2, "14": 3 },
          stance:    { "13": 2, "14": 3 },
          above50:   { "13": 3, "14": 4 },
          hexedfoes: { "13": 2, "14": 3 },
          hexed:     { "15": 2, "16": 3, "17": 3, "18": 4 },
          below50:   { "15": 2, "16": 3, "17": 3, "18": 4 }
        },
        thresholds: {
          god: 400,
          high: 200,
          mid: 100,
          low: 20
        }
      }
    };

    /*
      Staff scoring.
      This replaces the huge hardcoded mapping with a score model.
      You can tune the numbers easily later.
    */
    const premiumStaffAttrs = new Set(["fire", "death"]);
    const usableStaffAttrs = new Set(["blood", "curses", "smite", "heal", "dom"]);
    const collectorStaffAttrs = new Set(["air", "water", "earth", "prot", "divine", "illu"]);

    const staffReqHsrScores = {
      "11": 1,
      "12": 2,
      "13": 4,
      "14": 8,
      "15": 16,
      "16": 32
    };

    const staffReqEnergyBonuses = {
      "5": 1,
      "6": 2,
      "7": 4,
      "8": 8
    };
    
    const staffNoReqHsrScores = {
      "11": 1,
      "12": 2,
      "13": 4,
      "14": 8
    };
    
    const staffNoReqEnergyBonuses = {
      "5": 1,
      "6": 4
    };

    function getStaffAttrBonus(attr) {
      if (!attr) return 1;
      if (attr === "generic") return 2;
      if (premiumStaffAttrs.has(attr)) return 8;
      if (usableStaffAttrs.has(attr)) return 4;
      if (collectorStaffAttrs.has(attr)) return 1;
      return 1;
    }

    function getStaffHctPercentBonus(attr, pct) {
      if (!pct) return 1;

      if (attr === "generic") {
        if (pct === "9") return 2;
        if (pct === "8") return 1;
        return 1;
      }

      if (pct === "18") return 8;
      if (pct === "17") return 4;
      if (pct === "16") return 2;
      if (pct === "15") return 1;
      return 1;
    }

  function scoreStaff(criteria) {
    const isNoReq = criteria.noReq === "yes";
  
    const hsrScore = isNoReq
      ? (staffNoReqHsrScores[criteria.hsr] ?? 0)
      : (staffReqHsrScores[criteria.hsr] ?? 0);
  
    const energyBonus = isNoReq
      ? (staffNoReqEnergyBonuses[criteria.energy] ?? 1)
      : (staffReqEnergyBonuses[criteria.energy] ?? 1);
  
    let inherentMultiplier = 1;
    let attrBonus = 1;
    let hctPercentBonus = 1;
  
    if (criteria.inherent === "none") {
      inherentMultiplier = 1;
    } else if (criteria.inherent === "reduces_duration") {
      inherentMultiplier = isNoReq ? 1 : 1.2;
    } else if (criteria.inherent === "hct") {
      inherentMultiplier = isNoReq ? 2 : 2.5;
      attrBonus = getStaffAttrBonus(criteria.attr);
      hctPercentBonus = getStaffHctPercentBonus(criteria.attr, criteria.hctPercent);
    }
  
    const modBlock = inherentMultiplier * attrBonus * hctPercentBonus;
    const totalScore = hsrScore * modBlock * energyBonus;
  
    return {
      totalScore,
      breakdown: {
        hsrScore,
        energyBonus,
        inherentMultiplier,
        attrBonus,
        hctPercentBonus,
        modBlock
      }
    };
  }

    function staffScoreToTier(score, isNoReq) {
      if (isNoReq) {
        if (score >= 180) return "Highly Collectable";
        if (score >= 60) return "Collectable";
        if (score >= 20) return "Low End";
        return "Junk";
      }

      if (score >= 1800) return "God Tier";
      if (score >= 700) return "High End";
      if (score >= 250) return "Mid Tier";
      if (score >= 80) return "Low End";
      if (score >= 20) return "Collectable";
      return "Junk";
    }

    function getNoReqValue() {
      const slider = document.getElementById("no_req_slider");
      if (!slider) return "";

      if (slider.value === "0") return "yes";
      if (slider.value === "2") return "no";
      return "";
    }

    function hasChosenNoReq() {
      return getNoReqValue() !== "";
    }

    function resetAllFields() {
      document.querySelectorAll(".itemFields select").forEach(select => {
        select.value = "";
      });

      document.getElementById("no_req_slider").value = "1";

      const axePiercing = document.getElementById("axe_piercing");
      const swordShort = document.getElementById("sword_short");

      if (axePiercing) axePiercing.checked = false;
      if (swordShort) swordShort.checked = false;

      document.getElementById("hctAttributeDiv").classList.add("hidden");
      document.getElementById("hctPercentDiv").classList.add("hidden");
      document.getElementById("staff_attr").value = "";
      document.getElementById("staff_hct_percent").value = "";

      document.getElementById("weapon_inherent").value = "";
      document.getElementById("weapon_damage_percent").innerHTML = '<option value="">-- Select --</option>';
      document.getElementById("weaponDamagePercentDiv").classList.add("hidden");

      document.getElementById("result").innerText = "";
      document.getElementById("debug").innerText = "";

      const specialQuestionFields = document.getElementById("specialQuestionFields");
      const axePiercingRow = document.getElementById("axePiercingRow");
      const swordShortRow = document.getElementById("swordShortRow");

      if (specialQuestionFields) specialQuestionFields.classList.add("hidden");
      if (axePiercingRow) axePiercingRow.classList.add("hidden");
      if (swordShortRow) swordShortRow.classList.add("hidden");
    }

    function showFields() {
      const type = document.getElementById("itemType").value;
      const noReqContainer = document.getElementById("noReqContainer");
      const checkButton = document.getElementById("checkItemButton");
      const martialSharedFields = document.getElementById("martialSharedFields");

      resetAllFields();

      noReqContainer.classList.toggle("hidden", type === "");

      document.querySelectorAll(".itemFields").forEach(div => {
        div.classList.add("hidden");
      });

      martialSharedFields.classList.add("hidden");
      checkButton.classList.add("hidden");

      updateSpecialQuestionVisibility();
    }

    function noReqChanged() {
      const type = document.getElementById("itemType").value;
      const noReqChosen = hasChosenNoReq();
      const checkButton = document.getElementById("checkItemButton");
      const martialSharedFields = document.getElementById("martialSharedFields");

      document.querySelectorAll(".itemFields").forEach(div => {
        div.classList.add("hidden");
      });

      martialSharedFields.classList.add("hidden");
      checkButton.classList.toggle("hidden", !noReqChosen);

      if (!type || !noReqChosen) {
        document.getElementById("result").innerText = "";
        document.getElementById("debug").innerText = "";
        updateSpecialQuestionVisibility();
        return;
      }

      document.querySelectorAll(".itemFields").forEach(div => {
        const types = div.dataset.type.split(",");
        div.classList.toggle("hidden", !types.includes(type));
      });

      if (type === "staff") {
        populateHSR();
        populateEnergy();
      }

      if (MARTIAL_TYPES.includes(type)) {
        martialSharedFields.classList.remove("hidden");
        populateWeaponDamage(type);
      }

      document.getElementById("result").innerText = "";
      document.getElementById("debug").innerText = "";

      updateSpecialQuestionVisibility();
    }

    function populateHSR() {
      const noReq = getNoReqValue() === "yes";
      const hsrSelect = document.getElementById("staff_hsr");

      hsrSelect.innerHTML = '<option value="">-- Select --</option>';

      const values = noReq ? [11, 12, 13, 14] : [11, 12, 13, 14, 15, 16];
      values.forEach(v => hsrSelect.add(new Option(v, v)));
    }

    function populateEnergy() {
      const noReq = getNoReqValue() === "yes";
      const energySelect = document.getElementById("staff_energy");

      energySelect.innerHTML = '<option value="">-- Select --</option>';

      const values = noReq ? [5, 6] : [5, 6, 7, 8];
      values.forEach(v => energySelect.add(new Option(v, v)));
    }

    function inherentChanged() {
      const inherent = document.getElementById("staff_inherent").value;
      const hctDiv = document.getElementById("hctAttributeDiv");
      const percentDiv = document.getElementById("hctPercentDiv");

      if (inherent === "hct") {
        hctDiv.classList.remove("hidden");
      } else {
        hctDiv.classList.add("hidden");
        percentDiv.classList.add("hidden");
        document.getElementById("staff_attr").value = "";
        document.getElementById("staff_hct_percent").value = "";
      }
    }

    function hctAttributeChanged() {
      const attr = document.getElementById("staff_attr").value;
      const percentDiv = document.getElementById("hctPercentDiv");
      const percentSelect = document.getElementById("staff_hct_percent");

      percentSelect.innerHTML = '<option value="">-- Select --</option>';

      if (!attr) {
        percentDiv.classList.add("hidden");
        return;
      }

      percentDiv.classList.remove("hidden");
      const values = attr === "generic" ? [8, 9] : [15, 16, 17, 18];
      values.forEach(v => percentSelect.add(new Option(v, v)));
    }

    function getDamageOptions(type, noReq) {
      const damageOptions = {
        axe: {
          noReq: ["5-10", "5-11", "6-12"],
          req: [
            { value: "6-15", label: "6-15 or lower" },
            "6-16", "6-17", "6-18", "6-19", "6-20", "7-18", "7-19", "7-20"
          ]
        },
        sword: {
          noReq: ["6-9", "7-9", "7-10", "8-10"],
          req: [
            { value: "10-13", label: "10-13 or lower" },
            "10-14", "11-14", "11-15", "11-16", "12-16", "12-17"
          ]
        },
        hammer: {
          noReq: ["9-13", "9-14", "10-14", "10-15", "11-15"],
          req: [
            { value: "14-21", label: "14-21 or lower" },
            "14-22", "14-23", "14-24", "15-24", "15-25", "15-26"
          ]
        },
        bow: {
          noReq: ["7-11", "7-12", "8-12", "9-13"],
          req: [
            { value: "11-16", label: "11-16 or lower" },
            "11-17", "11-18", "11-19", "12-18", "12-19", "12-20", "12-21"
          ]
        }
      };

      if (!damageOptions[type]) return [];
      return noReq ? damageOptions[type].noReq : damageOptions[type].req;
    }

    function setSelectOptions(selectId, options) {
      const select = document.getElementById(selectId);
      if (!select) return;

      select.innerHTML = '<option value="">-- Select --</option>';

      options.forEach(option => {
        if (typeof option === "string") {
          select.add(new Option(option, option));
        } else {
          select.add(new Option(option.label, option.value));
        }
      });
    }

    function populateWeaponDamage(type) {
      const noReq = getNoReqValue() === "yes";
      const options = getDamageOptions(type, noReq);
      setSelectOptions(`${type}_damage`, options);
    }

    function weaponInherentChanged() {
      const inherent = document.getElementById("weapon_inherent").value;
      const percentDiv = document.getElementById("weaponDamagePercentDiv");
      const percentSelect = document.getElementById("weapon_damage_percent");

      percentSelect.innerHTML = '<option value="">-- Select --</option>';

      if (!inherent || inherent === "none") {
        percentDiv.classList.add("hidden");
        updateSpecialQuestionVisibility();
        return;
      }

      percentDiv.classList.remove("hidden");

      let values = [];
      if (["enchanted", "stance", "hexedfoes", "above50"].includes(inherent)) {
        values = [13, 14];
      } else if (["below50", "hexed"].includes(inherent)) {
        values = [15, 16, 17, 18];
      }

      values.forEach(v => percentSelect.add(new Option(v + "%", v)));

      updateSpecialQuestionVisibility();
    }

    function updateSpecialQuestionVisibility() {
      const type = document.getElementById("itemType").value;
      const specialQuestionFields = document.getElementById("specialQuestionFields");
      const axePiercingRow = document.getElementById("axePiercingRow");
      const swordShortRow = document.getElementById("swordShortRow");

      if (!specialQuestionFields || !axePiercingRow || !swordShortRow) return;

      const damage = document.getElementById(type + "_damage")?.value || "";
      const inherent = document.getElementById("weapon_inherent")?.value || "";
      const percent = document.getElementById("weapon_damage_percent")?.value || "";

      const isMartial = MARTIAL_TYPES.includes(type);
      const noReqChosen = hasChosenNoReq();

      if (!isMartial || !noReqChosen) {
        specialQuestionFields.classList.add("hidden");
        axePiercingRow.classList.add("hidden");
        swordShortRow.classList.add("hidden");
        document.getElementById("axe_piercing").checked = false;
        document.getElementById("sword_short").checked = false;
        return;
      }

      const baseFieldsComplete =
        damage &&
        inherent &&
        (inherent === "none" || percent);

      const showAxe = baseFieldsComplete && type === "axe";
      const showSword = baseFieldsComplete && type === "sword";

      specialQuestionFields.classList.toggle("hidden", !(showAxe || showSword));
      axePiercingRow.classList.toggle("hidden", !showAxe);
      swordShortRow.classList.toggle("hidden", !showSword);

      if (!showAxe) {
        document.getElementById("axe_piercing").checked = false;
      }

      if (!showSword) {
        document.getElementById("sword_short").checked = false;
      }
    }

    function findTier(criteria, mappings, keys) {
      for (const mapping of mappings) {
        let matched = true;

        for (const key of keys) {
          const mappingValue = mapping[key] ?? "";
          const criteriaValue = criteria[key] ?? "";

          if (mappingValue !== "" && mappingValue !== criteriaValue) {
            matched = false;
            break;
          }
        }

        if (matched) {
          return mapping;
        }
      }

      return { tier: "Junk" };
    }

    function scoreReqMartial(type, criteria) {
      const config = martialReqConfigs[type];
      if (!config) {
        return {
          totalScore: 0,
          breakdown: {
            damageScore: 0,
            skinValue: 1,
            inherentBonus: 1,
            percentBonus: 1,
            baseScore: 0,
            modMultiplier: 1,
            skinMode: "flat"
          }
        };
      }

      const damageScore = config.damageScores[criteria.damage] ?? 0;
      const inherentKey = criteria.inherent || "none";
      const inherentBonus = config.inherentBonuses[inherentKey] ?? 1;
      const percentBonus = config.percentBonuses[inherentKey]?.[criteria.percent] ?? 1;
      const skinValue = config.skinValues[criteria.skin] ?? 1;

      const baseScore = config.skinMode === "bonus"
        ? damageScore * skinValue
        : damageScore;

      const modMultiplier = inherentKey === "none"
        ? inherentBonus
        : inherentBonus * percentBonus;

      let totalScore = baseScore * modMultiplier;

      if (config.skinMode === "malus") {
        totalScore = totalScore / skinValue;
      }

      return {
        totalScore,
        breakdown: {
          damageScore,
          skinValue,
          inherentBonus,
          percentBonus,
          baseScore,
          modMultiplier,
          skinMode: config.skinMode
        }
      };
    }

    function reqMartialScoreToTier(type, score) {
      const thresholds = martialReqConfigs[type]?.thresholds;
      if (!thresholds) return "Junk";

      if (score >= thresholds.god) return "God Tier";
      if (score >= thresholds.high) return "High End";
      if (score >= thresholds.mid) return "Mid Tier";
      if (score >= thresholds.low) return "Low End";
      return "Junk";
    }

    function getStaffCriteria() {
      return {
        noReq: getNoReqValue(),
        hsr: document.getElementById("staff_hsr").value,
        energy: document.getElementById("staff_energy").value,
        inherent: document.getElementById("staff_inherent").value,
        attr: document.getElementById("staff_attr").value,
        hctPercent: document.getElementById("staff_hct_percent").value
      };
    }

    function getMartialCriteria(type) {
      let skin = "";

      if (type === "bow") {
        skin = document.getElementById("bow_skin").value;
      }

      if (type === "axe") {
        skin = document.getElementById("axe_piercing").checked ? "piercing" : "";
      }

      if (type === "sword") {
        skin = document.getElementById("sword_short").checked ? "short" : "";
      }

      return {
        type,
        skin,
        noReq: getNoReqValue(),
        damage: document.getElementById(type + "_damage").value,
        inherent: document.getElementById("weapon_inherent").value,
        percent: document.getElementById("weapon_damage_percent").value
      };
    }

    function validateStaffInput(criteria) {
      if (!criteria.noReq) {
        return "Please choose Yes or No for No Req?.";
      }

      if (!criteria.hsr || !criteria.energy || !criteria.inherent) {
        return "Please complete all required staff fields.";
      }

      if (criteria.inherent === "hct" && !criteria.attr) {
        return "Please select the HCT attribute.";
      }

      if (criteria.inherent === "hct" && !criteria.hctPercent) {
        return "Please select the HCT %.";
      }

      return "";
    }

    function validateMartialInput(criteria) {
      if (!criteria.noReq) {
        return "Please choose Yes or No for No Req?.";
      }

      if (criteria.type === "bow" && !criteria.skin) {
        return "Please select the bow skin.";
      }

      if (!criteria.damage) {
        return "Please select the damage range.";
      }

      if (!criteria.inherent) {
        return "Please select the inherent damage increase.";
      }

      if (criteria.inherent !== "none" && !criteria.percent) {
        return "Please select the damage increase %.";
      }

      return "";
    }

    function calculateStaffTier() {
      const criteria = getStaffCriteria();
      const validationMessage = validateStaffInput(criteria);

      if (validationMessage) {
        return { error: validationMessage };
      }

      const normalizedCriteria = {
        ...criteria,
        attr: criteria.inherent === "hct" ? criteria.attr : "",
        hctPercent: criteria.inherent === "hct" ? criteria.hctPercent : ""
      };

      const scoreResult = scoreStaff(normalizedCriteria);
      const tier = staffScoreToTier(scoreResult.totalScore, normalizedCriteria.noReq === "yes");

      return {
        tier,
        score: scoreResult.totalScore,
        breakdown: scoreResult.breakdown
      };
    }

    function calculateMartialTier(type) {
      const criteria = getMartialCriteria(type);
      const validationMessage = validateMartialInput(criteria);

      if (validationMessage) {
        return { error: validationMessage };
      }

      const scoringCriteria = {
        ...criteria,
        inherent: criteria.inherent === "none" ? "none" : criteria.inherent,
        percent: criteria.inherent === "none" ? "" : criteria.percent
      };

      if (scoringCriteria.noReq === "no" && martialReqConfigs[type]) {
        const scoreResult = scoreReqMartial(type, scoringCriteria);
        const tier = reqMartialScoreToTier(type, scoreResult.totalScore);

        return {
          tier,
          score: scoreResult.totalScore,
          breakdown: scoreResult.breakdown
        };
      }

      const mappingCriteria = {
        ...criteria,
        inherent: criteria.inherent === "none" ? "" : criteria.inherent,
        percent: criteria.inherent === "none" ? "" : criteria.percent
      };

      const match = findTier(
        mappingCriteria,
        martialTierMappings,
        ["type", "skin", "noReq", "damage", "inherent", "percent"]
      );

      return { tier: match.tier, match, criteria: mappingCriteria };
    }

    function calculatePlaceholderTier(type) {
      return {
        tier: "Logic not added yet.",
        info: `${type} framework added, but scoring rules are not defined yet.`
      };
    }

    function checkItem() {
      const type = document.getElementById("itemType").value;
      const resultEl = document.getElementById("result");
      const debugEl = document.getElementById("debug");

      if (!type) {
        resultEl.innerText = "Please select an item type.";
        debugEl.innerText = "";
        return;
      }

      let result;

    if (type === "staff") {
      debugEl.innerText =
        `Score: ${result.score} | ` +
        `HSR: ${result.breakdown.hsrScore} | ` +
        `Inherent Mult: ${result.breakdown.inherentMultiplier} | ` +
        `Attr: ${result.breakdown.attrBonus} | ` +
        `HCT%: ${result.breakdown.hctPercentBonus} | ` +
        `Mod Block: ${result.breakdown.modBlock} | ` +
        `Energy Mult: ${result.breakdown.energyBonus}`;
      return;
    }

      if (result.error) {
        resultEl.innerText = result.error;
        debugEl.innerText = "";
        return;
      }

      resultEl.innerText = `Item Tier: ${result.tier}`;

      if (result.breakdown) {
        if (type === "staff") {
          debugEl.innerText =
            `Score: ${result.score} | ` +
            `HSR: ${result.breakdown.hsrScore} | ` +
            `Energy: ${result.breakdown.energyScore} | ` +
            `Inherent Mult: ${result.breakdown.inherentMultiplier} | ` +
            `Attr: ${result.breakdown.attrBonus} | ` +
            `HCT%: ${result.breakdown.hctPercentBonus} | ` +
            `Base: ${result.breakdown.baseScore}`;
          return;
        }

        const skinPart =
          result.breakdown.skinMode === "bonus"
            ? `Skin Bonus: ${result.breakdown.skinValue} | `
            : result.breakdown.skinMode === "malus"
            ? `Skin Malus: ${result.breakdown.skinValue} | `
            : "";

        debugEl.innerText =
          `Score: ${result.score} | ` +
          `Damage: ${result.breakdown.damageScore} | ` +
          skinPart +
          `Inherent: ${result.breakdown.inherentBonus} | ` +
          `Percent: ${result.breakdown.percentBonus} | ` +
          `Base: ${result.breakdown.baseScore} | ` +
          `Multiplier: ${result.breakdown.modMultiplier}`;
      } else {
        debugEl.innerText = result.info || "";
      }
    }
  </script>
