<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pre-Searing Item Tiers – WIP!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2 class="header-red">Pre-Searing Item Tiers – ⚠ WIP</h2>

  <div class="topField">
    <label for="itemType">Item Type:</label>
    <select id="itemType">
      <option value="">-- Select --</option>
      <option value="axe">Axe</option>
      <option value="bow">Bow</option>
      <option value="focus">Focus</option>
      <option value="hammer">Hammer</option>
      <option value="shield">Shield</option>
      <option value="staff">Staff</option>
      <option value="sword">Sword</option>
      <option value="wand">Wand</option>
      <option value="misc">Miscellaneous</option>
    </select>
  </div>

  <div id="checkTypeContainer" class="topField hidden">
    <label for="checkType">Check Type:</label>
    <select id="checkType">
      <option value="">-- Select --</option>
      <option value="weapon">Weapon</option>
      <option value="prefix">Prefix Modifier</option>
      <option value="suffix">Suffix Modifier</option>
    </select>
  </div>

  <div id="noReqContainer" class="hidden">
    <label for="no_req_slider"><strong>No Req?</strong></label>
    <div class="noReqSliderWrap">
      <span>Yes</span>
      <input
        type="range"
        id="no_req_slider"
        min="0"
        max="2"
        step="1"
        value="1"
      >
      <span>No</span>
    </div>
  </div>

  <div id="weaponFieldsContainer">
    <div class="itemFields hidden" data-type="staff">
      <label for="staff_hsr">HSR %:</label>
      <select id="staff_hsr">
        <option value="">-- Select --</option>
      </select>

      <label for="staff_energy">Energy:</label>
      <select id="staff_energy">
        <option value="">-- Select --</option>
      </select>

      <label for="staff_inherent">Inherent Modifier:</label>
      <select id="staff_inherent">
        <option value="">-- Select --</option>
        <option value="none">None</option>
        <option value="reduces_duration">Reduces condition duration</option>
        <option value="hct">HCT</option>
      </select>

      <div id="hctAttributeDiv" class="hidden compact">
        <label for="staff_attr">HCT Attribute:</label>
        <select id="staff_attr">
          <option value="">-- Select --</option>
          <option value="generic">Generic</option>
          <option value="air">Air</option>
          <option value="blood">Blood</option>
          <option value="curses">Curses</option>
          <option value="death">Death</option>
          <option value="divine">Divine Favor</option>
          <option value="dom">Domination</option>
          <option value="earth">Earth</option>
          <option value="fire">Fire</option>
          <option value="heal">Heal</option>
          <option value="illu">Illusion</option>
          <option value="prot">Prot</option>
          <option value="smite">Smite</option>
          <option value="water">Water</option>
        </select>
      </div>

      <div id="hctPercentDiv" class="hidden compact">
        <label for="staff_hct_percent">HCT %:</label>
        <select id="staff_hct_percent">
          <option value="">-- Select --</option>
        </select>
      </div>
    </div>

    <div class="itemFields hidden" data-type="axe">
      <label for="axe_damage">Damage Range:</label>
      <select id="axe_damage">
        <option value="">-- Select --</option>
      </select>
    </div>

    <div class="itemFields hidden" data-type="sword">
      <label for="sword_damage">Damage Range:</label>
      <select id="sword_damage">
        <option value="">-- Select --</option>
      </select>
    </div>

    <div class="itemFields hidden" data-type="hammer">
      <label for="hammer_damage">Damage Range:</label>
      <select id="hammer_damage">
        <option value="">-- Select --</option>
      </select>
    </div>

    <div class="itemFields hidden" data-type="bow">
      <label for="bow_skin">Skin:</label>
      <select id="bow_skin">
        <option value="">-- Select --</option>
        <option value="flat">Flatbow</option>
        <option value="horn">Hornbow</option>
        <option value="long">Longbow</option>
        <option value="recurve">Recurve Bow</option>
        <option value="short">Shortbow</option>
      </select>

      <label for="bow_damage">Damage Range:</label>
      <select id="bow_damage">
        <option value="">-- Select --</option>
      </select>
    </div>

    <div id="martialSharedFields" class="hidden">
      <label for="weapon_inherent">Inherent Damage Increase:</label>
      <select id="weapon_inherent">
        <option value="">-- Select --</option>
        <option value="none">None</option>
        <option value="above50">while Health is above 50%</option>
        <option value="below50">while Health is below 50%</option>
        <option value="enchanted">while Enchanted</option>
        <option value="hexed">while Hexed</option>
        <option value="stance">while in a Stance</option>
        <option value="hexedfoes">vs. Hexed foes</option>
      </select>

      <div id="weaponDamagePercentDiv" class="hidden">
        <label for="weapon_damage_percent">Damage Increase %:</label>
        <select id="weapon_damage_percent">
          <option value="">-- Select --</option>
        </select>
      </div>

      <div id="specialQuestionFields" class="hidden">
        <div id="axePiercingRow" class="hidden noReqRow">
          <label>
            <input type="checkbox" id="axe_piercing">
            Piercing Axe?
          </label>
        </div>

        <div id="swordShortRow" class="hidden noReqRow">
          <label>
            <input type="checkbox" id="sword_short">
            Short Sword?
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="itemFields hidden" data-type="wand">
    <label>Wand logic placeholder</label>
  </div>

  <div class="itemFields hidden" data-type="shield">
    <label>Shield logic placeholder</label>
  </div>

  <div class="itemFields hidden" data-type="focus">
    <label>Focus logic placeholder</label>
  </div>

  <div class="itemFields hidden" data-type="misc">
    <label>Miscellaneous logic placeholder</label>
  </div>

  <button id="checkItemButton" class="hidden">Check Item</button>

  <h3 id="result"></h3>
  <div id="debug" class="subtle"></div>

  <div id="itemDisclaimer" class="disclaimerBox hidden"></div>

  <div class="bottomLinks">
    <div>
      <a href="https://discord.gg/B3JfepPu" target="_blank" rel="noopener noreferrer">
        <strong>Pre-Searing Discord</strong>
      </a>
    </div>

    <div>
      <a href="ADD-FAQ-LINK-HERE" target="_blank" rel="noopener noreferrer">
        <strong>Item FAQ</strong>
      </a>
      – Explanation of prefix / inherent / suffix / HSR / HCT
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
