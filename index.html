<!DOCTYPE html>
<html>
<head>
  <title>Pre-Searing Item Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: black;
      color: #cccccc;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .itemFields label,
    .topField label,
    #martialSharedFields label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    .itemFields select,
    .topField select,
    #martialSharedFields select {
      background: black;
      color: #cccccc;
      border: 1px solid #cccccc;
      padding: 6px;
      display: block;
      margin-top: 4px;
      margin-bottom: 16px;
    }

    .noReqSliderWrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    #no_req_slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 12px;
      background: #444;
      border-radius: 6px;
      outline: none;
    }

    #no_req_slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: #cccccc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid black;
    }

    #no_req_slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #cccccc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid black;
    }

    #checkItemButton {
      background: #cccccc;
      color: black;
      border: 1px solid black;
      padding: 6px 10px;
      margin-top: 20px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    .compact select,
    .compact input[type="checkbox"] {
      margin-bottom: 12px;
    }

    .header-red {
      color: #8a090c;
    }

    .hidden {
      display: none;
    }

    h3 {
      margin-top: 24px;
    }

    .noReqRow {
      margin-top: 12px;
      margin-bottom: 12px;
    }

    .noReqRow label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: bold;
    }

    .subtle {
      color: #999999;
      font-size: 0.95em;
      margin-top: -8px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <h2 class="header-red">Pre-Searing Item Checker</h2>

  <div class="topField">
    <label>Item Type:</label>
    <select id="itemType" onchange="showFields()">
      <option value="">-- Select --</option>
      <option value="staff">Staff</option>
      <option value="axe">Axe</option>
      <option value="sword">Sword</option>
      <option value="hammer">Hammer</option>
      <option value="bow">Bow</option>
    </select>
  </div>

  <div id="noReqContainer" class="hidden">
    <label for="no_req_slider"><strong>No Req?</strong></label>
    <div class="noReqSliderWrap">
      <span>Yes</span>
      <input
        type="range"
        id="no_req_slider"
        min="0"
        max="2"
        step="1"
        value="1"
        oninput="noReqChanged()"
      >
      <span>No</span>
    </div>
  </div>

  <div class="itemFields hidden" data-type="staff">
    <label>HSR %:</label>
    <select id="staff_hsr">
      <option value="">-- Select --</option>
    </select>

    <label>Energy:</label>
    <select id="staff_energy">
      <option value="">-- Select --</option>
    </select>

    <label>Inherent Modifier:</label>
    <select id="staff_inherent" onchange="inherentChanged()">
      <option value="">-- Select --</option>
      <option value="none">None</option>
      <option value="reduces_duration">Reduces condition duration</option>
      <option value="hct">HCT</option>
    </select>

    <div id="hctAttributeDiv" class="hidden compact">
      <label>HCT Attribute:</label>
      <select id="staff_attr" onchange="hctAttributeChanged()">
        <option value="">-- Select --</option>
        <option value="generic">Generic</option>
        <option value="fire">Fire</option>
        <option value="air">Air</option>
        <option value="water">Water</option>
        <option value="earth">Earth</option>
        <option value="death">Death</option>
        <option value="blood">Blood</option>
        <option value="curses">Curses</option>
        <option value="smite">Smite</option>
        <option value="heal">Heal</option>
        <option value="prot">Prot</option>
        <option value="divine">Divine Favor</option>
        <option value="dom">Domination</option>
        <option value="illu">Illusion</option>
      </select>
    </div>

    <div id="hctPercentDiv" class="hidden compact">
      <label>HCT %:</label>
      <select id="staff_hct_percent">
        <option value="">-- Select --</option>
      </select>
    </div>
  </div>

  <div class="itemFields hidden" data-type="axe">
    <label>Damage Range:</label>
    <select id="axe_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="sword">
    <label>Damage Range:</label>
    <select id="sword_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="hammer">
    <label>Damage Range:</label>
    <select id="hammer_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div class="itemFields hidden" data-type="bow">
    <label>Skin:</label>
    <select id="bow_skin">
      <option value="">-- Select --</option>
      <option value="short">Shortbow</option>
      <option value="recurve">Recurve Bow</option>
      <option value="long">Longbow</option>
      <option value="flat">Flatbow</option>
      <option value="horn">Hornbow</option>
    </select>

    <label>Damage Range:</label>
    <select id="bow_damage" onchange="updateSpecialQuestionVisibility()">
      <option value="">-- Select --</option>
    </select>
  </div>

  <div id="martialSharedFields" class="hidden">
    <label>Inherent Damage Increase:</label>
    <select id="weapon_inherent" onchange="weaponInherentChanged()">
      <option value="">-- Select --</option>
      <option value="none">None</option>
      <option value="enchanted">while Enchanted</option>
      <option value="stance">while in a Stance</option>
      <option value="hexedfoes">vs. Hexed foes</option>
      <option value="above50">while Health is above 50%</option>
      <option value="below50">while Health is below 50%</option>
      <option value="hexed">while Hexed</option>
    </select>

    <div id="weaponDamagePercentDiv" class="hidden">
      <label>Damage Increase %:</label>
      <select id="weapon_damage_percent" onchange="updateSpecialQuestionVisibility()">
        <option value="">-- Select --</option>
      </select>
    </div>

    <div id="specialQuestionFields" class="hidden">
      <div id="axePiercingRow" class="hidden noReqRow">
        <label>
          <input type="checkbox" id="axe_piercing">
          Piercing Axe?
        </label>
      </div>

      <div id="swordShortRow" class="hidden noReqRow">
        <label>
          <input type="checkbox" id="sword_short">
          Shortsword?
        </label>
      </div>
    </div>
  </div>

  <button id="checkItemButton" onclick="checkItem()" class="hidden">
    Check Item
  </button>

      { noReq: "", hsr: "12", energy: "8", inherent: "hct", attr: "fire", hctPercent: "18", tier: "Low End" },
      { noReq: "", hsr: "12", energy: "7", inherent: "hct", attr: "fire", hctPercent: "18", tier: "Low End" },
    
      { noReq: "", hsr: "", energy: "", inherent: "", attr: "", hctPercent: "", tier: "Junk" }
    ];

    const martialTierMappings = [
      /* temporary fallback mappings for no-req bows / other martial weapons */
    ];

  const reqBowDamageScores = {
    "11-16": 0,
    "11-17": 1,
    "11-18": 2,
    "11-19": 5,
    "12-18": 5,
    "12-19": 10,
    "12-20": 20,
    "12-21": 80
  };
  
  const bowSkinBonuses = {
    short: 1,
    long: 2,
    recurve: 2,
    flat: 3,
    horn: 4
  };
  
  const reqBowInherentBonuses = {
    none: 1,
    hexedfoes: 1,
    below50: 1,
    enchanted: 1,
    hexed: 2,
    stance: 3,
    above50: 4
  };
  
  const reqBowPercentBonuses = {
    enchanted: { "13": 2, "14": 3 },
    stance:    { "13": 2, "14": 3 },
    above50:   { "13": 2, "14": 3 },
    hexedfoes: { "13": 2, "14": 3 },
    hexed:     { "15": 2, "16": 2, "17": 2, "18": 3 },
    below50:   { "15": 2, "16": 2, "17": 2, "18": 3 }
  };

 const reqAxeDamageScores = {
  "6-15": 0,
  "6-16": 1,
  "6-17": 2,
  "6-18": 3,
  "6-19": 4,
  "7-18": 5,
  "6-20": 6,
  "7-19": 7,
  "7-20": 8,
  "7-21": 10
};

const axeSkinMalus = {
  "": 1,
  piercing: 3
};

const reqAxeInherentBonuses = {
  none: 1,
  hexedfoes: 1,
  below50: 1,
  enchanted: 1,
  stance: 2,
  hexed: 2,
  above50: 4
};

const reqAxePercentBonuses = {
  enchanted: { "13": 2, "14": 3 },
  stance:    { "13": 2, "14": 3 },
  above50:   { "13": 3, "14": 4 },
  hexedfoes: { "13": 2, "14": 3 },
  hexed:     { "15": 2, "16": 3, "17": 3, "18": 4 },
  below50:   { "15": 2, "16": 3, "17": 3, "18": 4 }
};

    function getNoReqValue() {
      const slider = document.getElementById("no_req_slider");
      if (!slider) return "";

      if (slider.value === "0") return "yes";
      if (slider.value === "2") return "no";
      return "";
    }

    function hasChosenNoReq() {
      return getNoReqValue() !== "";
    }

    function resetAllFields() {
      document.querySelectorAll(".itemFields select").forEach(select => {
        select.value = "";
      });

      document.getElementById("no_req_slider").value = "1";
 
      document.getElementById("axe_piercing").checked = false;
      document.getElementById("sword_short").checked = false;

      document.getElementById("hctAttributeDiv").classList.add("hidden");
      document.getElementById("hctPercentDiv").classList.add("hidden");
      document.getElementById("staff_attr").value = "";
      document.getElementById("staff_hct_percent").value = "";

      document.getElementById("weapon_inherent").value = "";
      document.getElementById("weapon_damage_percent").innerHTML = '<option value="">-- Select --</option>';
      document.getElementById("weaponDamagePercentDiv").classList.add("hidden");

      document.getElementById("result").innerText = "";
      document.getElementById("debug").innerText = "";

      const specialQuestionFields = document.getElementById("specialQuestionFields");
      const axePiercingRow = document.getElementById("axePiercingRow");
      const swordShortRow = document.getElementById("swordShortRow");

      if (specialQuestionFields) specialQuestionFields.classList.add("hidden");
      if (axePiercingRow) axePiercingRow.classList.add("hidden");
      if (swordShortRow) swordShortRow.classList.add("hidden");
    }

    function showFields() {
      const type = document.getElementById("itemType").value;
      const noReqContainer = document.getElementById("noReqContainer");
      const checkButton = document.getElementById("checkItemButton");
      const martialSharedFields = document.getElementById("martialSharedFields");

      resetAllFields();

      noReqContainer.classList.toggle("hidden", type === "");

      document.querySelectorAll(".itemFields").forEach(div => {
        div.classList.add("hidden");
      });

      martialSharedFields.classList.add("hidden");
      checkButton.classList.add("hidden");

      updateSpecialQuestionVisibility();
    }

    function noReqChanged() {
      const type = document.getElementById("itemType").value;
      const noReqChosen = hasChosenNoReq();
      const checkButton = document.getElementById("checkItemButton");
      const martialSharedFields = document.getElementById("martialSharedFields");

      document.querySelectorAll(".itemFields").forEach(div => {
        div.classList.add("hidden");
      });

      martialSharedFields.classList.add("hidden");
      checkButton.classList.toggle("hidden", !noReqChosen);

      if (!type || !noReqChosen) {
        document.getElementById("result").innerText = "";
        document.getElementById("debug").innerText = "";
        updateSpecialQuestionVisibility();
        return;
      }

      document.querySelectorAll(".itemFields").forEach(div => {
        const types = div.dataset.type.split(",");
        div.classList.toggle("hidden", !types.includes(type));
      });

      if (type === "staff") {
        populateHSR();
        populateEnergy();
      }

      if (["axe", "sword", "hammer", "bow"].includes(type)) {
        martialSharedFields.classList.remove("hidden");
        populateWeaponDamage(type);
      }

      document.getElementById("result").innerText = "";
      document.getElementById("debug").innerText = "";

      updateSpecialQuestionVisibility();
    }

    function populateHSR() {
      const noReq = getNoReqValue() === "yes";
      const hsrSelect = document.getElementById("staff_hsr");

      hsrSelect.innerHTML = '<option value="">-- Select --</option>';

      const values = noReq ? [11, 12, 13, 14] : [11, 12, 13, 14, 15, 16];
      values.forEach(v => hsrSelect.add(new Option(v, v)));
    }

    function populateEnergy() {
      const noReq = getNoReqValue() === "yes";
      const energySelect = document.getElementById("staff_energy");

      energySelect.innerHTML = '<option value="">-- Select --</option>';

      const values = noReq ? [5, 6] : [5, 6, 7, 8];
      values.forEach(v => energySelect.add(new Option(v, v)));
    }

    function inherentChanged() {
      const inherent = document.getElementById("staff_inherent").value;
      const hctDiv = document.getElementById("hctAttributeDiv");
      const percentDiv = document.getElementById("hctPercentDiv");

      if (inherent === "hct") {
        hctDiv.classList.remove("hidden");
      } else {
        hctDiv.classList.add("hidden");
        percentDiv.classList.add("hidden");
        document.getElementById("staff_attr").value = "";
        document.getElementById("staff_hct_percent").value = "";
      }
    }

    function hctAttributeChanged() {
      const attr = document.getElementById("staff_attr").value;
      const percentDiv = document.getElementById("hctPercentDiv");
      const percentSelect = document.getElementById("staff_hct_percent");

      percentSelect.innerHTML = '<option value="">-- Select --</option>';

      if (!attr) {
        percentDiv.classList.add("hidden");
        return;
      }

      percentDiv.classList.remove("hidden");
      const values = attr === "generic" ? [8, 9] : [15, 16, 17, 18];
      values.forEach(v => percentSelect.add(new Option(v, v)));
    }

    function getDamageOptions(type, noReq) {
      const damageOptions = {
        axe: {
          noReq: ["5-10", "5-11", "6-12"],
          req: [
            { value: "6-15", label: "6-15 or lower" },
            "6-16", "6-17", "6-18", "6-19", "6-20", "7-18", "7-19", "7-20", "7-21"
          ]
        },
        sword: {
          noReq: ["6-9", "7-9", "7-10", "8-10"],
          req: [
            { value: "10-13", label: "10-13 or lower" },
            "10-14", "11-14", "11-15", "11-16", "12-16", "12-17"
          ]
        },
        hammer: {
          noReq: ["9-13", "9-14", "10-14", "10-15", "11-15"],
          req: [
            { value: "14-21", label: "14-21 or lower" },
            "14-22", "14-23", "14-24", "15-24", "15-25", "15-26"
          ]
        },
        bow: {
          noReq: ["7-11", "7-12", "8-12", "9-13"],
          req: [
            { value: "11-16", label: "11-16 or lower" },
            "11-17", "11-18", "11-19", "12-18", "12-19", "12-20", "12-21"
          ]
        }
      };

      if (!damageOptions[type]) return [];
      return noReq ? damageOptions[type].noReq : damageOptions[type].req;
    }

    function setSelectOptions(selectId, options) {
      const select = document.getElementById(selectId);
      if (!select) return;

      select.innerHTML = '<option value="">-- Select --</option>';

      options.forEach(option => {
        if (typeof option === "string") {
          select.add(new Option(option, option));
        } else {
          select.add(new Option(option.label, option.value));
        }
      });
    }

    function populateWeaponDamage(type) {
      const noReq = getNoReqValue() === "yes";
      const options = getDamageOptions(type, noReq);
      setSelectOptions(`${type}_damage`, options);
    }

    function weaponInherentChanged() {
      const inherent = document.getElementById("weapon_inherent").value;
      const percentDiv = document.getElementById("weaponDamagePercentDiv");
      const percentSelect = document.getElementById("weapon_damage_percent");

      percentSelect.innerHTML = '<option value="">-- Select --</option>';

      if (!inherent || inherent === "none") {
        percentDiv.classList.add("hidden");
        updateSpecialQuestionVisibility();
        return;
      }

      percentDiv.classList.remove("hidden");

      let values = [];
      if (["enchanted", "stance", "hexedfoes","above50"].includes(inherent)) {
        values = [13, 14];
      } else if ([ "below50", "hexed"].includes(inherent)) {
        values = [15, 16, 17, 18];
      }

      values.forEach(v => percentSelect.add(new Option(v + "%", v)));

      updateSpecialQuestionVisibility();
    }

    function updateSpecialQuestionVisibility() {
      const type = document.getElementById("itemType").value;
      const specialQuestionFields = document.getElementById("specialQuestionFields");
      const axePiercingRow = document.getElementById("axePiercingRow");
      const swordShortRow = document.getElementById("swordShortRow");

      if (!specialQuestionFields || !axePiercingRow || !swordShortRow) {
        return;
      }

      const damage = document.getElementById(type + "_damage")?.value || "";
      const inherent = document.getElementById("weapon_inherent")?.value || "";
      const percent = document.getElementById("weapon_damage_percent")?.value || "";

      const isMartial = ["axe", "sword", "hammer", "bow"].includes(type);
      const noReqChosen = hasChosenNoReq();

      if (!isMartial || !noReqChosen) {
        specialQuestionFields.classList.add("hidden");
        axePiercingRow.classList.add("hidden");
        swordShortRow.classList.add("hidden");
        document.getElementById("axe_piercing").checked = false;
        document.getElementById("sword_short").checked = false;
        return;
      }

      const baseFieldsComplete =
        damage &&
        inherent &&
        (inherent === "none" || percent);

      const showAxe = baseFieldsComplete && type === "axe";
      const showSword = baseFieldsComplete && type === "sword";

      specialQuestionFields.classList.toggle("hidden", !(showAxe || showSword));
      axePiercingRow.classList.toggle("hidden", !showAxe);
      swordShortRow.classList.toggle("hidden", !showSword);

      if (!showAxe) {
        document.getElementById("axe_piercing").checked = false;
      }

      if (!showSword) {
        document.getElementById("sword_short").checked = false;
      }
    }

    function findTier(criteria, mappings, keys) {
      for (const mapping of mappings) {
        let matched = true;

        for (const key of keys) {
          const mappingValue = mapping[key] ?? "";

          if (mappingValue !== "" && mappingValue !== criteria[key]) {
            matched = false;
            break;
          }
        }

        if (matched) {
          return mapping;
        }
      }

      return { tier: "Junk" };
    }

  function scoreReqBow(criteria) {
    const damageScore = reqBowDamageScores[criteria.damage] ?? 0;
    const skinBonus = bowSkinBonuses[criteria.skin] ?? 0;
  
    const inherentKey = criteria.inherent || "none";
    const inherentBonus = reqBowInherentBonuses[inherentKey] ?? 1;
    const percentBonus = reqBowPercentBonuses[inherentKey]?.[criteria.percent] ?? 1;
  
    const baseScore = damageScore * skinBonus;
  
    let modMultiplier;
    if (inherentKey === "none") {
      modMultiplier = inherentBonus;
    } else {
      modMultiplier = inherentBonus * percentBonus;
    }
  
    const totalScore = baseScore * modMultiplier;
  
    return {
      totalScore,
      breakdown: {
        damageScore,
        skinBonus,
        inherentBonus,
        percentBonus,
        baseScore,
        modMultiplier
      }
    };
  }
    
  function scoreReqAxe(criteria) {
    const damageScore = reqAxeDamageScores[criteria.damage] ?? 0;
    const skinMalus = axeSkinMalus[criteria.skin] ?? 1;
  
    const inherentKey = criteria.inherent || "none";
    const inherentBonus = reqAxeInherentBonuses[inherentKey] ?? 1;
    const percentBonus = reqAxePercentBonuses[inherentKey]?.[criteria.percent] ?? 1;
  
    const baseScore = damageScore;
  
    let modMultiplier;
    if (inherentKey === "none") {
      modMultiplier = inherentBonus;
    } else {
      modMultiplier = inherentBonus * percentBonus;
    }
  
    const totalScore = (baseScore * modMultiplier) / skinMalus;
  
    return {
      totalScore,
      breakdown: {
        damageScore,
        skinMalus,
        inherentBonus,
        percentBonus,
        baseScore,
        modMultiplier
      }
    };
  }

  function reqBowScoreToTier(score) {
    if (score >= 600) return "God Tier";
    if (score >= 200) return "High End";
    if (score >= 100) return "Mid Tier";
    if (score >= 25) return "Low End";
    return "Junk";
    }

  function reqAxeScoreToTier(score) {
    if (score >= 60) return "God Tier";
    if (score >= 40) return "High End";
    if (score >= 20) return "Mid Tier";
    if (score >= 5) return "Low End";
    return "Junk";
}

    function getStaffCriteria() {
      return {
        noReq: getNoReqValue(),
        hsr: document.getElementById("staff_hsr").value,
        energy: document.getElementById("staff_energy").value,
        inherent: document.getElementById("staff_inherent").value,
        attr: document.getElementById("staff_attr").value,
        hctPercent: document.getElementById("staff_hct_percent").value
      };
    }

    function getMartialCriteria(type) {
      let skin = "";

      if (type === "bow") {
        skin = document.getElementById("bow_skin").value;
      }

      if (type === "axe") {
        skin = document.getElementById("axe_piercing").checked ? "piercing" : "";
      }

      if (type === "sword") {
        skin = document.getElementById("sword_short").checked ? "short" : "";
      }

      return {
        type,
        skin,
        noReq: getNoReqValue(),
        damage: document.getElementById(type + "_damage").value,
        inherent: document.getElementById("weapon_inherent").value,
        percent: document.getElementById("weapon_damage_percent").value
      };
    }

    function validateStaffInput(criteria) {
      if (!criteria.noReq) {
        return "Please choose Yes or No for No Req?.";
      }

      if (!criteria.hsr || !criteria.energy || !criteria.inherent) {
        return "Please complete all required staff fields.";
      }

      if (criteria.inherent === "hct" && !criteria.attr) {
        return "Please select the HCT attribute.";
      }

      if (criteria.inherent === "hct" && !criteria.hctPercent) {
        return "Please select the HCT %.";
      }

      return "";
    }

    function validateMartialInput(criteria) {
      if (!criteria.noReq) {
        return "Please choose Yes or No for No Req?.";
      }

      if (criteria.type === "bow" && !criteria.skin) {
        return "Please select the bow skin.";
      }

      if (!criteria.damage) {
        return "Please select the damage range.";
      }

      if (!criteria.inherent) {
        return "Please select the inherent damage increase.";
      }

      if (criteria.inherent !== "none" && !criteria.percent) {
        return "Please select the damage increase %.";
      }

      return "";
    }

    function calculateStaffTier() {
      const criteria = getStaffCriteria();
      const validationMessage = validateStaffInput(criteria);

      if (validationMessage) {
        return { error: validationMessage };
      }

      const normalizedCriteria = {
        ...criteria,
        attr: criteria.inherent === "hct" ? criteria.attr : "",
        hctPercent: criteria.inherent === "hct" ? criteria.hctPercent : ""
      };

      const match = findTier(
        normalizedCriteria,
        staffTierMappings,
        ["noReq", "hsr", "energy", "inherent", "attr", "hctPercent"]
      );

      return { tier: match.tier, match, criteria: normalizedCriteria };
    }

  function calculateMartialTier(type) {
    const criteria = getMartialCriteria(type);
    const validationMessage = validateMartialInput(criteria);
  
    if (validationMessage) {
      return { error: validationMessage };
    }
  
    const scoringCriteria = {
      ...criteria,
      inherent: criteria.inherent === "none" ? "none" : criteria.inherent,
      percent: criteria.inherent === "none" ? "" : criteria.percent
    };
  
    if (type === "bow" && scoringCriteria.noReq === "no") {
      const scoreResult = scoreReqBow(scoringCriteria);
      const tier = reqBowScoreToTier(scoreResult.totalScore);
  
      return {
        tier,
        score: scoreResult.totalScore,
        breakdown: scoreResult.breakdown
      };
    }
  
    if (type === "axe" && scoringCriteria.noReq === "no") {
      const scoreResult = scoreReqAxe(scoringCriteria);
      const tier = reqAxeScoreToTier(scoreResult.totalScore);
  
      return {
        tier,
        score: scoreResult.totalScore,
        breakdown: scoreResult.breakdown
      };
    }

  const mappingCriteria = {
    ...criteria,
    inherent: criteria.inherent === "none" ? "" : criteria.inherent,
    percent: criteria.inherent === "none" ? "" : criteria.percent
  };

  const match = findTier(
    mappingCriteria,
    martialTierMappings,
    ["type", "skin", "noReq", "damage", "inherent", "percent"]
  );

  return { tier: match.tier, match, criteria: mappingCriteria };
}

  function checkItem() {
    const type = document.getElementById("itemType").value;
    const resultEl = document.getElementById("result");
    const debugEl = document.getElementById("debug");
  
    if (!type) {
      resultEl.innerText = "Please select an item type.";
      debugEl.innerText = "";
      return;
    }
  
    let result;
  
    if (type === "staff") {
      result = calculateStaffTier();
    } else if (["axe", "sword", "hammer", "bow"].includes(type)) {
      result = calculateMartialTier(type);
    } else {
      resultEl.innerText = "Logic not added yet.";
      debugEl.innerText = "";
      return;
    }
  
    if (result.error) {
      resultEl.innerText = result.error;
      debugEl.innerText = "";
      return;
    }
  
    resultEl.innerText = `Item Tier: ${result.tier}`;
  
    if (result.breakdown) {
      const skinPart = result.breakdown.skinBonus !== undefined
        ? `Skin: ${result.breakdown.skinBonus} | `
        : result.breakdown.skinMalus !== undefined
        ? `Skin Malus: ${result.breakdown.skinMalus} | `
        : "";
  
      debugEl.innerText =
        `Score: ${result.score} | ` +
        `Damage: ${result.breakdown.damageScore} | ` +
        skinPart +
        `Inherent: ${result.breakdown.inherentBonus} | ` +
        `Percent: ${result.breakdown.percentBonus} | ` +
        `Base: ${result.breakdown.baseScore} | ` +
        `Multiplier: ${result.breakdown.modMultiplier}`;
    } else {
      debugEl.innerText = "";
    }
  }
      
</script>
